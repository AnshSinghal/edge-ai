<svg width="720" height="520" viewBox="0 0 720 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>Scheduler Fallback Decision Tree</title>
<desc>Decision tree for scheduler fallback behavior: what happens when a request cannot be dispatched normally — queue full, agent down, quota exceeded, backpressure active.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">SCHEDULER FALLBACK DECISION TREE</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">admission → dispatch feasibility → degradation path → MFE notification</text>

<!-- Root: Request arrives -->
<rect x="280" y="50" width="160" height="30" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.3)" stroke-width="0.5"/>
<text x="360" y="69" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(250,249,245)">Request Arrives</text>

<line x1="360" y1="80" x2="360" y2="100" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- Decision 1: Agent connected? -->
<rect x="270" y="102" width="180" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="360" y="120" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(175,169,236)">agent connected?</text>

<!-- NO: agent down -->
<line x1="270" y1="116" x2="100" y2="116" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="185" y="110" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.6">no</text>

<rect x="20" y="102" width="80" height="28" rx="4" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="60" y="120" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)">SUSPENDED</text>

<line x1="60" y1="130" x2="60" y2="150" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- Suspended sub-decision: queue or reject? -->
<rect x="10" y="152" width="100" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="60" y="170" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)">queue &lt; 32?</text>

<line x1="60" y1="180" x2="60" y2="200" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="70" y="195" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">yes</text>

<rect x="14" y="202" width="92" height="40" rx="4" fill="rgb(38,38,36)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="60" y="218" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)">enqueue + wait</text>
<text x="60" y="232" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">timeout at 30s</text>

<line x1="110" y1="166" x2="140" y2="166" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="126" y="160" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.6">no</text>

<rect x="142" y="152" width="88" height="40" rx="4" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="186" y="168" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)">reject: queue_full</text>
<text x="186" y="182" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">MFE: "system busy"</text>

<!-- YES: agent connected -->
<line x1="360" y1="130" x2="360" y2="160" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="370" y="148" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">yes</text>

<!-- Decision 2: Backpressure active? -->
<rect x="270" y="162" width="180" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="360" y="180" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(240,153,123)">backpressure active?</text>

<!-- YES: backpressure -->
<line x1="450" y1="176" x2="520" y2="176" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="486" y="170" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.6">yes</text>

<rect x="522" y="162" width="170" height="40" rx="4" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="607" y="178" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)">enqueue, dispatch paused</text>
<text x="607" y="192" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">resumes after Retry-After</text>

<!-- NO: not in backpressure -->
<line x1="360" y1="190" x2="360" y2="220" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="370" y="208" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">no</text>

<!-- Decision 3: Slot available? -->
<rect x="270" y="222" width="180" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="360" y="240" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(93,202,165)">in_flight &lt; max?</text>

<!-- NO: all slots full -->
<line x1="450" y1="236" x2="520" y2="236" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="486" y="230" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.6">no</text>

<!-- Sub-decision: P0 preempt P2? -->
<rect x="522" y="220" width="170" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="607" y="238" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)">P0 &amp;&amp; any P2 in-flight?</text>

<line x1="607" y1="248" x2="607" y2="272" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="617" y="264" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">yes</text>

<rect x="547" y="274" width="120" height="40" rx="4" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="607" y="290" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)">preempt youngest P2</text>
<text x="607" y="304" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">abort + re-queue victim</text>

<!-- No preemption possible -->
<line x1="692" y1="234" x2="706" y2="234" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<path d="M706 234 L706 290 L696 290" fill="none" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="710" y="266" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.6">no</text>

<!-- SATURATED box already exists for "no preempt" path, show it separately -->

<!-- YES: slot available -->
<line x1="360" y1="250" x2="360" y2="280" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="370" y="268" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">yes</text>

<!-- Decision 4: Per-MFE quota -->
<rect x="270" y="282" width="180" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="360" y="300" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(175,169,236)">caller &lt; per_mfe_max?</text>

<!-- YES: dispatch -->
<line x1="360" y1="310" x2="360" y2="340" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="370" y="328" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">yes</text>

<rect x="290" y="342" width="140" height="30" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="360" y="361" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">Dispatch to Agent</text>

<!-- NO: MFE quota exceeded -->
<line x1="270" y1="296" x2="180" y2="296" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="225" y="290" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.6">no</text>

<rect x="90" y="282" width="90" height="40" rx="4" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="135" y="298" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)">skip to next</text>
<text x="135" y="312" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">other MFE dispatched</text>

<!-- ═══ MFE NOTIFICATION MAPPING ═══ -->
<line x1="40" y1="390" x2="680" y2="390" stroke="rgba(222,220,209,0.12)" stroke-width="0.5"/>
<text x="360" y="412" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">FALLBACK → MFE UI MAPPING</text>

<!-- Mapping table -->
<rect x="60" y="424" width="150" height="22" rx="0" fill="rgb(38,38,36)"/>
<text x="135" y="439" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.6">Scheduler State</text>

<rect x="210" y="424" width="190" height="22" rx="0" fill="rgb(38,38,36)"/>
<text x="305" y="439" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.6">MFE Receives</text>

<rect x="400" y="424" width="250" height="22" rx="0" fill="rgb(38,38,36)"/>
<text x="525" y="439" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.6">Recommended UI</text>

<!-- Row 1 -->
<text x="135" y="462" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)">Dispatched</text>
<text x="305" y="462" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">result (ok / degraded)</text>
<text x="525" y="462" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">show result, note degradation badge</text>

<!-- Row 2 -->
<text x="135" y="478" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)">Queued (saturated)</text>
<text x="305" y="478" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">pending → then result</text>
<text x="525" y="478" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">spinner / skeleton with "processing..."</text>

<!-- Row 3 -->
<text x="135" y="494" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)">Queue full</text>
<text x="305" y="494" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">{ error: queue_full }</text>
<text x="525" y="494" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">"System busy — try again in a moment"</text>

<!-- Row 4 -->
<text x="135" y="510" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)">Suspended</text>
<text x="305" y="510" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">{ error: disconnected }</text>
<text x="525" y="510" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">"AI offline — reconnecting..." banner</text>
</svg>