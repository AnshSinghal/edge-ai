<svg width="720" height="480" viewBox="0 0 720 480" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>Client-Side Scheduler Lifecycle — State Machine</title>
<desc>State machine for the scheduler component: IDLE → DISPATCHING → BACKPRESSURE → DRAINING, with per-state queue and slot behavior.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">SCHEDULER LIFECYCLE — STATE MACHINE</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">request arrival · slot management · backpressure · agent reconnect</text>

<!-- ═══ STATE NODES ═══ -->

<!-- IDLE -->
<rect x="40" y="66" width="120" height="50" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.3)" stroke-width="0.5"/>
<text x="100" y="86" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(250,249,245)">IDLE</text>
<text x="100" y="102" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">0 in-flight, 0 queued</text>

<!-- DISPATCHING -->
<rect x="240" y="66" width="140" height="50" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="310" y="86" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(159,225,203)">DISPATCHING</text>
<text x="310" y="102" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)" opacity="0.6">slots used, queue draining</text>

<!-- SATURATED -->
<rect x="470" y="66" width="130" height="50" rx="6" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="535" y="86" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(245,196,179)">SATURATED</text>
<text x="535" y="102" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)" opacity="0.6">4/4 slots, queue non-empty</text>

<!-- BACKPRESSURE -->
<rect x="240" y="190" width="140" height="50" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="310" y="210" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(200,80,70)">BACKPRESSURE</text>
<text x="310" y="226" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)" opacity="0.6">429 received, AIMD active</text>

<!-- DRAINING -->
<rect x="470" y="190" width="130" height="50" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="535" y="210" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(206,203,246)">DRAINING</text>
<text x="535" y="226" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.6">agent reconnected, flush queue</text>

<!-- SUSPENDED -->
<rect x="40" y="190" width="120" height="50" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="100" y="210" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(200,80,70)">SUSPENDED</text>
<text x="100" y="226" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)" opacity="0.6">agent disconnected</text>

<!-- ═══ TRANSITIONS ═══ -->

<!-- IDLE → DISPATCHING -->
<line x1="160" y1="91" x2="234" y2="91" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="197" y="84" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">request arrives</text>

<!-- DISPATCHING → SATURATED -->
<line x1="380" y1="91" x2="464" y2="91" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="422" y="84" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.6">4/4 slots full</text>

<!-- SATURATED → DISPATCHING (slot freed) -->
<path d="M470 108 L422 108 L388 108" fill="none" stroke="rgb(93,202,165)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<text x="429" y="122" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">slot freed</text>

<!-- DISPATCHING → IDLE (queue drained + all complete) -->
<path d="M240 108 L190 108 L168 108" fill="none" stroke="rgb(194,192,182)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<text x="204" y="122" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">all done</text>

<!-- DISPATCHING → BACKPRESSURE (429) -->
<line x1="310" y1="116" x2="310" y2="184" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="324" y="154" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.6">429 received</text>

<!-- SATURATED → BACKPRESSURE (429) -->
<path d="M535 116 L535 150 L380 190" fill="none" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="480" y="154" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.8">429</text>

<!-- BACKPRESSURE → DISPATCHING (Retry-After expires + 200 OK) -->
<path d="M350" y1="190" d="M348 190 L370 150 L370 116" fill="none" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="384" y="154" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">retry + 200</text>

<!-- DISPATCHING → SUSPENDED (agent down) -->
<path d="M240 100 L180 140 L100 184" fill="none" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="148" y="148" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.6">ECONNREFUSED</text>

<!-- SUSPENDED → DRAINING (agent reconnected) -->
<line x1="160" y1="215" x2="464" y2="215" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="312" y="209" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.6">connection:restored</text>

<!-- DRAINING → DISPATCHING (queue flushed) -->
<path d="M535 190 L535 150 L380 116" fill="none" stroke="rgb(93,202,165)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<text x="500" y="138" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">flushed</text>

<!-- ═══ PER-STATE BEHAVIOR TABLE ═══ -->
<line x1="40" y1="264" x2="680" y2="264" stroke="rgba(222,220,209,0.12)" stroke-width="0.5"/>
<text x="360" y="286" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">PER-STATE BEHAVIOR</text>

<!-- Table header -->
<rect x="40" y="298" width="640" height="22" rx="0" fill="rgb(38,38,36)"/>
<text x="100" y="313" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.6">State</text>
<text x="240" y="313" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.6">New request arrives</text>
<text x="420" y="313" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.6">Slot behavior</text>
<text x="590" y="313" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.6">MFE sees</text>

<!-- Rows -->
<text x="100" y="338" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(250,249,245)">IDLE</text>
<text x="240" y="338" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">dispatch immediately</text>
<text x="420" y="338" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">0 → 1 used</text>
<text x="590" y="338" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">instant dispatch</text>

<text x="100" y="358" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)">DISPATCHING</text>
<text x="240" y="358" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">dispatch if slot + quota free</text>
<text x="420" y="358" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">1-3 used, WFQ active</text>
<text x="590" y="358" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">may queue briefly</text>

<text x="100" y="378" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)">SATURATED</text>
<text x="240" y="378" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">enqueue (P0 may preempt P2)</text>
<text x="420" y="378" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">4/4 used, wait for free</text>
<text x="590" y="378" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">loading state</text>

<text x="100" y="398" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)">BACKPRESSURE</text>
<text x="240" y="398" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">enqueue, dispatch paused</text>
<text x="420" y="398" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">AIMD: max reduced to 1-2</text>
<text x="590" y="398" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">longer wait</text>

<text x="100" y="418" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)">SUSPENDED</text>
<text x="240" y="418" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">enqueue (timeout after 30s)</text>
<text x="420" y="418" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">all frozen, no dispatch</text>
<text x="590" y="418" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">loading / offline</text>

<text x="100" y="438" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)">DRAINING</text>
<text x="240" y="438" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">enqueue normally</text>
<text x="420" y="438" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">rapid fill to max</text>
<text x="590" y="438" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">burst of results</text>

<!-- Footer -->
<text x="360" y="470" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">MFEs never observe these states directly — they see { connected, tier, queued_ms } from useEdgeAgent(). The lifecycle is internal.</text>
</svg>