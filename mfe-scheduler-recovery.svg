<svg width="720" height="560" viewBox="0 0 720 560" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>Scheduler Recovery Sequences</title>
<desc>Three recovery scenarios: 429 backpressure recovery, agent disconnect recovery, and timeout cascade recovery — swimlane diagrams showing timing and state transitions.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">SCHEDULER RECOVERY SEQUENCES</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">backpressure (AIMD) · agent disconnect · timeout cascade</text>

<!-- ═══ SCENARIO 1: 429 BACKPRESSURE ═══ -->
<rect x="40" y="50" width="640" height="144" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="60" y="68" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(200,80,70)">Scenario 1 — 429 Backpressure Recovery (AIMD)</text>

<!-- Timeline -->
<line x1="80" y1="100" x2="660" y2="100" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="80" y="94" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">t=0</text>
<text x="190" y="94" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">t=0ms</text>
<text x="310" y="94" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">t=2000ms</text>
<text x="440" y="94" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">t=2050ms</text>
<text x="560" y="94" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">t=~8s</text>

<!-- Events -->
<circle cx="80" cy="100" r="3" fill="rgb(200,80,70)"/>
<text x="80" y="118" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.7">429 received</text>

<circle cx="190" cy="100" r="3" fill="rgb(240,153,123)"/>
<text x="190" y="118" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.7">max: 4→2</text>
<text x="190" y="130" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.8">pause dispatch</text>

<circle cx="310" cy="100" r="3" fill="rgb(175,169,236)"/>
<text x="310" y="118" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.7">Retry-After</text>
<text x="310" y="130" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.8">resume at max=2</text>

<circle cx="440" cy="100" r="3" fill="rgb(93,202,165)"/>
<text x="440" y="118" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.7">200 OK</text>
<text x="440" y="130" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">max: 2→3</text>

<circle cx="560" cy="100" r="3" fill="rgb(93,202,165)"/>
<text x="560" y="118" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.7">successive 200s</text>
<text x="560" y="130" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">max: 3→4 (restored)</text>

<!-- Connecting arrows -->
<line x1="86" y1="100" x2="184" y2="100" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="196" y1="100" x2="304" y2="100" stroke="rgb(240,153,123)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<line x1="316" y1="100" x2="434" y2="100" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="446" y1="100" x2="554" y2="100" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- State labels -->
<rect x="110" y="144" width="100" height="18" rx="3" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="160" y="156" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)">BACKPRESSURE</text>

<rect x="340" y="144" width="90" height="18" rx="3" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="385" y="156" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)">DISPATCHING</text>

<rect x="540" y="144" width="90" height="18" rx="3" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.3)" stroke-width="0.5"/>
<text x="585" y="156" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)">NORMAL</text>

<line x1="210" y1="153" x2="334" y2="153" stroke="rgba(222,220,209,0.15)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="430" y1="153" x2="534" y2="153" stroke="rgba(222,220,209,0.15)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- MFE note -->
<text x="360" y="182" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">MFE sees: longer queued_ms during recovery — never sees 429 error</text>

<!-- ═══ SCENARIO 2: AGENT DISCONNECT ═══ -->
<rect x="40" y="202" width="640" height="156" rx="6" fill="rgb(38,38,36)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="60" y="220" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(175,169,236)">Scenario 2 — Agent Disconnect Recovery</text>

<!-- Swimlane labels -->
<text x="60" y="248" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">Scheduler</text>
<text x="60" y="280" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">Agent</text>
<text x="60" y="310" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">MFEs</text>

<!-- Swimlane lines -->
<line x1="120" y1="244" x2="660" y2="244" stroke="rgba(222,220,209,0.1)" stroke-width="0.5"/>
<line x1="120" y1="276" x2="660" y2="276" stroke="rgba(222,220,209,0.1)" stroke-width="0.5"/>
<line x1="120" y1="306" x2="660" y2="306" stroke="rgba(222,220,209,0.1)" stroke-width="0.5"/>

<!-- Events: ECONNREFUSED -->
<rect x="130" y="268" width="78" height="16" rx="3" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="169" y="279" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)">ECONNREFUSED</text>

<line x1="169" y1="268" x2="169" y2="248" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- Scheduler: abort in-flight, freeze -->
<rect x="140" y="236" width="96" height="16" rx="3" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="188" y="247" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)">→ SUSPENDED</text>

<!-- Abort in-flight -->
<rect x="252" y="236" width="80" height="16" rx="3" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="292" y="247" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)">abort 4 slots</text>

<!-- MFE receives errors -->
<line x1="292" y1="252" x2="292" y2="302" stroke="rgb(240,153,123)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<rect x="252" y="300" width="110" height="16" rx="3" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="307" y="311" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)">error: disconnected</text>

<!-- Queue holds new requests -->
<rect x="370" y="236" width="76" height="16" rx="3" fill="rgb(38,38,36)" stroke="rgb(194,192,182)" stroke-width="0.5"/>
<text x="408" y="247" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.6">queue holds</text>

<line x1="332" y1="244" x2="364" y2="244" stroke="rgba(222,220,209,0.15)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- Agent comes back -->
<rect x="470" y="268" width="80" height="16" rx="3" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="510" y="279" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)">listening :8741</text>

<line x1="510" y1="268" x2="510" y2="248" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- Scheduler: DRAINING -->
<rect x="476" y="236" width="74" height="16" rx="3" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="513" y="247" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)">→ DRAINING</text>

<line x1="446" y1="244" x2="470" y2="244" stroke="rgba(222,220,209,0.15)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- Flush queue -->
<rect x="570" y="236" width="72" height="16" rx="3" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="606" y="247" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)">flush queue</text>

<line x1="550" y1="244" x2="564" y2="244" stroke="rgba(222,220,209,0.15)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- MFEs get results -->
<line x1="606" y1="252" x2="606" y2="302" stroke="rgb(93,202,165)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<rect x="566" y="300" width="82" height="16" rx="3" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="607" y="311" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)">results arrive</text>

<!-- Timing annotations -->
<text x="220" y="340" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">healthcheck polls every 2s — detects agent within 2s of restart</text>
<text x="220" y="352" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">queued requests survive disconnect if they don't timeout first</text>

<!-- ═══ SCENARIO 3: TIMEOUT CASCADE ═══ -->
<rect x="40" y="370" width="640" height="140" rx="6" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="60" y="388" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(240,153,123)">Scenario 3 — Timeout Cascade Recovery</text>
<text x="60" y="402" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.75">4 requests dispatched, agent stalls — all 4 timeout within 30s window</text>

<!-- Timeline -->
<line x1="80" y1="432" x2="660" y2="432" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>

<!-- t=0: stall begins -->
<circle cx="80" cy="432" r="3" fill="rgb(240,153,123)"/>
<text x="80" y="426" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.6">t=0 stall</text>

<!-- t=28s: oldest times out -->
<circle cx="200" cy="432" r="3" fill="rgb(200,80,70)"/>
<text x="200" y="426" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.7">t=28s</text>
<text x="200" y="450" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.8">slot 0: timeout</text>
<text x="200" y="462" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">→ dequeue next</text>

<!-- t=29s -->
<circle cx="310" cy="432" r="3" fill="rgb(200,80,70)"/>
<text x="310" y="426" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.7">t=29s</text>
<text x="310" y="450" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.8">slot 1: timeout</text>
<text x="310" y="462" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">→ dequeue next</text>

<!-- t=30s -->
<circle cx="420" cy="432" r="3" fill="rgb(200,80,70)"/>
<text x="420" y="426" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.7">t=30s</text>
<text x="420" y="450" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.8">slots 2+3: timeout</text>
<text x="420" y="462" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">→ dequeue 2 more</text>

<!-- t=30s+ recovery -->
<circle cx="560" cy="432" r="3" fill="rgb(93,202,165)"/>
<text x="560" y="426" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.7">t=30s+</text>
<text x="560" y="450" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">4 fresh dispatches</text>
<text x="560" y="462" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">agent may respond now</text>

<!-- Arrows -->
<line x1="86" y1="432" x2="194" y2="432" stroke="rgb(240,153,123)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<line x1="206" y1="432" x2="304" y2="432" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="316" y1="432" x2="414" y2="432" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="426" y1="432" x2="554" y2="432" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- Key insight -->
<text x="360" y="498" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">Each timeout frees a slot → triggers dequeue → next request dispatched immediately.</text>
<text x="360" y="510" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">Staggered dispatch times mean staggered timeouts — not a thundering herd.</text>

<!-- Footer -->
<text x="360" y="548" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">All three scenarios self-heal. The scheduler never requires manual intervention or restart.</text>
</svg>