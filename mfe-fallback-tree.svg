<svg width="720" height="500" viewBox="0 0 720 500" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>MFE Fallback Decision Tree</title>
<desc>Decision tree for how the shell EdgeAgentService degrades: connected → degraded → disconnected → offline mode, with per-MFE UI adaptation at each level.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">MFE FALLBACK DECISION TREE</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">shell-level fallback strategy · per-MFE UI adaptation · graceful degradation</text>

<!-- ═══ ROOT: Request arrives ═══ -->
<rect x="270" y="52" width="180" height="34" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.3)" stroke-width="0.5"/>
<text x="360" y="73" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(250,249,245)">MFE calls inference()</text>

<!-- Branch: connected? -->
<line x1="360" y1="86" x2="360" y2="108" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arr)"/>

<rect x="290" y="110" width="140" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="360" y="128" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(93,202,165)">connected?</text>

<!-- YES: connected -->
<line x1="290" y1="124" x2="180" y2="160" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="228" y="140" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)" opacity="0.6">yes</text>

<!-- NO: not connected -->
<line x1="430" y1="124" x2="540" y2="160" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="492" y="140" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)" opacity="0.6">no</text>

<!-- ═══ LEFT BRANCH: Connected path ═══ -->

<!-- Check: degraded? -->
<rect x="100" y="162" width="140" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="170" y="180" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(175,169,236)">tier == 0?</text>

<!-- YES: healthy, dispatch -->
<line x1="100" y1="176" x2="60" y2="212" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="74" y="194" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)" opacity="0.6">yes</text>

<rect x="20" y="214" width="100" height="46" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="70" y="232" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">Dispatch</text>
<text x="70" y="248" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)" opacity="0.6">full speed</text>

<!-- NO: degraded, dispatch + warn -->
<line x1="240" y1="176" x2="280" y2="212" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="266" y="194" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)" opacity="0.6">no</text>

<rect x="240" y="214" width="120" height="46" rx="6" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="300" y="232" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(245,196,179)">Dispatch + Warn</text>
<text x="300" y="248" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)" opacity="0.6">slower, emit event</text>

<!-- ═══ RIGHT BRANCH: Disconnected path ═══ -->

<!-- Check: reconnecting? -->
<rect x="480" y="162" width="140" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="550" y="180" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(175,169,236)">reconnecting?</text>

<!-- YES: reconnecting, queue locally -->
<line x1="480" y1="176" x2="440" y2="212" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="454" y="194" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.6">yes</text>

<rect x="380" y="214" width="120" height="46" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="440" y="232" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(206,203,246)">Queue Locally</text>
<text x="440" y="248" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.6">drain on restore</text>

<!-- NO: fully disconnected, return error -->
<line x1="620" y1="176" x2="660" y2="212" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="646" y="194" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)" opacity="0.6">no</text>

<rect x="600" y="214" width="100" height="46" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="650" y="232" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(200,80,70)">Return Error</text>
<text x="650" y="248" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)" opacity="0.6">agent_unavailable</text>

<!-- ═══ MFE UI MAPPING ═══ -->
<line x1="40" y1="284" x2="680" y2="284" stroke="rgba(222,220,209,0.12)" stroke-width="0.5"/>
<text x="360" y="306" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">MFE UI ADAPTATION PER FALLBACK LEVEL</text>

<!-- Level 0: Healthy -->
<rect x="40" y="320" width="144" height="80" rx="6" fill="rgb(38,38,36)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<rect x="44" y="324" width="4" height="72" rx="2" fill="rgb(93,202,165)" opacity="0.75"/>
<text x="56" y="338" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">Tier 0 — Healthy</text>
<text x="56" y="356" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">Doc Q&amp;A: normal UI</text>
<text x="56" y="372" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">MeetSum: normal UI</text>
<text x="56" y="388" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.8">full speed, no indicators</text>

<!-- Level 1-2: Degraded -->
<rect x="202" y="320" width="150" height="80" rx="6" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<rect x="206" y="324" width="4" height="72" rx="2" fill="rgb(240,153,123)" opacity="0.75"/>
<text x="218" y="338" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(245,196,179)">Tier 1-2 — Degraded</text>
<text x="218" y="356" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">Doc Q&amp;A: slow banner</text>
<text x="218" y="372" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">MeetSum: latency warn</text>
<text x="218" y="388" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(240,153,123)" opacity="0.8">results valid, 2-5x slower</text>

<!-- Level: Reconnecting -->
<rect x="370" y="320" width="150" height="80" rx="6" fill="rgb(38,38,36)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<rect x="374" y="324" width="4" height="72" rx="2" fill="rgb(175,169,236)" opacity="0.75"/>
<text x="386" y="338" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(206,203,246)">Reconnecting</text>
<text x="386" y="356" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">Doc Q&amp;A: loading state</text>
<text x="386" y="372" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">MeetSum: paused icon</text>
<text x="386" y="388" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(175,169,236)" opacity="0.8">requests queued locally</text>

<!-- Level: Offline -->
<rect x="538" y="320" width="144" height="80" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<rect x="542" y="324" width="4" height="72" rx="2" fill="rgb(200,80,70)" opacity="0.75"/>
<text x="554" y="338" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(200,80,70)">Offline</text>
<text x="554" y="356" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">Doc Q&amp;A: disabled</text>
<text x="554" y="372" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">MeetSum: disabled</text>
<text x="554" y="388" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(200,80,70)" opacity="0.8">"Agent not available" UI</text>

<!-- Assumptions -->
<line x1="40" y1="420" x2="680" y2="420" stroke="rgba(222,220,209,0.12)" stroke-width="0.5"/>
<text x="360" y="440" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">ASSUMPTIONS</text>
<text x="56" y="460" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.75">1. Edge Agent is installed and configured on the user's machine (not a cloud service).</text>
<text x="56" y="476" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.75">2. MFEs are loaded dynamically via Module Federation or similar — they share the shell's React Context tree.</text>
<text x="56" y="492" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.75">3. The enterprise web app runs in a standard browser (Chrome, Edge, Safari) — no special permissions or extensions required.</text>
</svg>