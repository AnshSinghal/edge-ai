<svg width="720" height="760" viewBox="0 0 720 760" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>NPU Failure → CPU Fallback Sequence</title>
<desc>Full fallback path when Qualcomm NPU returns ERROR_DEVICE_REMOVED on Windows ARM64. Shows detection, quarantine, CPU fallback, client notification, and periodic health probe.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">NPU FAILURE → CPU FALLBACK PATH</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">Qualcomm Snapdragon X · Windows ARM64 · ERROR_DEVICE_REMOVED</text>

<!-- Swimlane headers -->
<text x="90" y="62" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(240,153,123)" opacity="0.7" letter-spacing="0.06em">WORKER</text>
<text x="270" y="62" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(175,169,236)" opacity="0.7" letter-spacing="0.06em">DEVICE MANAGER</text>
<text x="450" y="62" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(93,202,165)" opacity="0.7" letter-spacing="0.06em">API GATEWAY</text>
<text x="630" y="62" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8" letter-spacing="0.06em">CLIENT</text>

<!-- Swimlane lines -->
<line x1="90" y1="72" x2="90" y2="730" stroke="rgb(240,153,123)" stroke-width="0.5" opacity="0.5"/>
<line x1="270" y1="72" x2="270" y2="730" stroke="rgb(175,169,236)" stroke-width="0.5" opacity="0.5"/>
<line x1="450" y1="72" x2="450" y2="730" stroke="rgb(93,202,165)" stroke-width="0.5" opacity="0.5"/>
<line x1="630" y1="72" x2="630" y2="730" stroke="rgb(194,192,182)" stroke-width="0.5" opacity="0.5"/>

<!-- ═══ PHASE 1: DETECTION ═══ -->
<text x="24" y="96" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(200,80,70)" opacity="0.8">DETECT</text>
<line x1="60" y1="90" x2="690" y2="90" stroke="rgba(222,220,209,0.08)" stroke-width="0.5"/>

<!-- Worker gets error -->
<rect x="38" y="100" width="104" height="50" rx="6" fill="rgb(113,43,19)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="90" y="118" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(240,120,110)">DXGI_ERROR_</text>
<text x="90" y="132" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(240,120,110)">DEVICE_REMOVED</text>
<text x="90" y="144" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(240,153,123)" opacity="0.6">from QC NPU driver</text>

<!-- Worker → Device Manager: report failure -->
<line x1="142" y1="120" x2="212" y2="120" stroke="rgb(194,192,182)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text x="177" y="114" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.8">report</text>

<!-- Device Manager quarantines -->
<rect x="214" y="100" width="112" height="50" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="270" y="118" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(206,203,246)">quarantine NPU</text>
<text x="270" y="134" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.6">npu.state = FAULTED</text>
<text x="270" y="146" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(175,169,236)" opacity="0.8">start health timer</text>

<!-- ═══ PHASE 2: FALLBACK ═══ -->
<text x="24" y="178" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(230,200,100)" opacity="0.8">FALLBACK</text>
<line x1="60" y1="172" x2="690" y2="172" stroke="rgba(222,220,209,0.08)" stroke-width="0.5"/>

<!-- Worker reinitializes with CPU -->
<rect x="34" y="182" width="112" height="56" rx="6" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="90" y="200" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(245,196,179)">reload session</text>
<text x="90" y="216" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)" opacity="0.6">EP = CPU</text>
<text x="90" y="230" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(240,153,123)" opacity="0.8">same process, new RT</text>

<!-- Worker retries the request on CPU -->
<rect x="38" y="248" width="104" height="36" rx="6" fill="rgb(113,43,19)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="90" y="264" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(159,225,203)">re-run inference</text>
<text x="90" y="278" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">CPU path (slower)</text>

<!-- Worker → Gateway: result + degraded flag -->
<line x1="142" y1="264" x2="396" y2="264" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="270" y="258" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">result + X-Edge-Compute: cpu-fallback</text>

<!-- ═══ PHASE 3: CLIENT NOTIFICATION ═══ -->
<text x="24" y="310" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(93,202,165)" opacity="0.8">NOTIFY</text>
<line x1="60" y1="304" x2="690" y2="304" stroke="rgba(222,220,209,0.08)" stroke-width="0.5"/>

<!-- Gateway enriches response -->
<rect x="392" y="314" width="116" height="56" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="450" y="332" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">enrich response</text>
<text x="450" y="348" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">add latency headers</text>
<text x="450" y="362" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.8">add degraded status</text>

<!-- Gateway → Client: response -->
<line x1="508" y1="340" x2="584" y2="340" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- Client receives -->
<rect x="586" y="314" width="88" height="56" rx="6" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="630" y="332" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(250,249,245)">200 OK</text>
<text x="630" y="348" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)">result present</text>
<text x="630" y="362" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(230,200,100)" opacity="0.7">headers warn</text>

<!-- ═══ PHASE 4: QUARANTINE LOOP ═══ -->
<text x="24" y="400" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(175,169,236)" opacity="0.8">PROBE</text>
<line x1="60" y1="394" x2="690" y2="394" stroke="rgba(222,220,209,0.08)" stroke-width="0.5"/>

<!-- Device Manager probes -->
<rect x="210" y="404" width="120" height="68" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="270" y="422" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(206,203,246)">health probe</text>
<text x="270" y="438" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(175,169,236)" opacity="0.6">every 30s (exp backoff)</text>
<text x="270" y="454" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.8">DXGIGetDebugInterface</text>
<text x="270" y="466" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.8">+ tiny inference test</text>

<!-- Probe fail branch -->
<line x1="270" y1="472" x2="270" y2="498" stroke="rgb(200,80,70)" stroke-width="0.5" stroke-dasharray="3 3"/>
<rect x="224" y="498" width="92" height="24" rx="4" fill="none" stroke="rgb(200,80,70)" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="270" y="514" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(200,80,70)" opacity="0.7">still faulted</text>
<text x="270" y="538" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">stay on CPU, retry in 60s</text>

<!-- Probe success branch -->
<line x1="330" y1="438" x2="400" y2="438" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="365" y="432" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">pass</text>

<!-- Restore NPU -->
<rect x="402" y="418" width="96" height="42" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="450" y="436" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">restore NPU</text>
<text x="450" y="452" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)" opacity="0.6">npu.state = READY</text>

<!-- Restore → Worker -->
<line x1="402" y1="450" x2="150" y2="450" stroke="rgb(93,202,165)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text x="276" y="446" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.8">reload session with NPU EP</text>

<!-- Worker back on NPU -->
<rect x="42" y="434" width="100" height="34" rx="6" fill="rgb(113,43,19)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="92" y="448" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(159,225,203)">NPU restored</text>
<text x="92" y="462" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">full speed</text>

<!-- ═══ DEVICE STATE MACHINE ═══ -->
<line x1="40" y1="490" x2="680" y2="490" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="360" y="510" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">NPU DEVICE STATE MACHINE</text>

<!-- READY state -->
<rect x="60" y="526" width="100" height="36" rx="18" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="110" y="548" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(159,225,203)">READY</text>

<!-- Arrow READY → FAULTED -->
<line x1="160" y1="544" x2="280" y2="544" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="220" y="538" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)" opacity="0.6">DEVICE_REMOVED</text>

<!-- FAULTED state -->
<rect x="282" y="526" width="110" height="36" rx="18" fill="rgb(113,43,19)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="337" y="548" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(240,120,110)">FAULTED</text>

<!-- Arrow FAULTED → PROBING -->
<line x1="392" y1="544" x2="490" y2="544" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="441" y="538" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(175,169,236)" opacity="0.6">timer fires</text>

<!-- PROBING state -->
<rect x="492" y="526" width="100" height="36" rx="18" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="542" y="548" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(206,203,246)">PROBING</text>

<!-- Arrow PROBING → READY (success) -->
<path d="M542 562 L542 582 L110 582 L110 562" fill="none" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="326" y="578" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">probe pass → reinit NPU session</text>

<!-- Arrow PROBING → FAULTED (fail) -->
<path d="M492 556 L440 576 L392 556" fill="none" stroke="rgb(200,80,70)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<text x="442" y="575" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(200,80,70)" opacity="0.8">fail → backoff</text>

<!-- ═══ RESPONSE HEADERS ═══ -->
<line x1="40" y1="604" x2="680" y2="604" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="360" y="624" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">RESPONSE HEADERS (LATENCY COMMUNICATION)</text>

<text x="60" y="648" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(93,202,165)">X-Edge-Compute: cpu-fallback</text>
<text x="440" y="648" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">NPU unavailable, used CPU</text>

<text x="60" y="668" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(230,200,100)">X-Edge-Latency-Factor: 3.2</text>
<text x="440" y="668" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">~3.2× slower than NPU baseline</text>

<text x="60" y="688" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(194,192,182)" opacity="0.6">X-Edge-Device-Status: degraded</text>
<text x="440" y="688" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">device quarantined, probing</text>

<text x="60" y="708" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(194,192,182)" opacity="0.6">X-Edge-Estimated-Restore: 30</text>
<text x="440" y="708" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">seconds until next health probe</text>

<!-- Footer -->
<text x="360" y="740" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">All fallback is in-process. No worker respawn needed. Client always gets a result (just slower).</text>
</svg>