<svg width="720" height="620" viewBox="0 0 720 620" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>Client-Side Request Scheduler Architecture</title>
<desc>Multi-level priority queue with per-MFE fairness, concurrency limiter, and backpressure handling for the shell EdgeAgentService.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">CLIENT-SIDE REQUEST SCHEDULER</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">3-level priority queue · per-MFE fairness · concurrency limiter · backpressure</text>

<!-- ═══ MFE CALLERS ═══ -->
<text x="52" y="62" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">MFE CALLERS</text>

<!-- Doc Q&A -->
<rect x="40" y="72" width="120" height="40" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="100" y="88" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(206,203,246)">Doc Q&amp;A</text>
<text x="100" y="102" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.8">quota: 2 / 4</text>

<!-- Meeting Sum -->
<rect x="180" y="72" width="120" height="40" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="240" y="88" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(206,203,246)">Meeting Sum</text>
<text x="240" y="102" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.8">quota: 2 / 4</text>

<!-- Future MFE -->
<rect x="320" y="72" width="120" height="40" rx="6" fill="none" stroke="rgba(222,220,209,0.25)" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="380" y="88" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.65">Future MFE</text>
<text x="380" y="102" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.65">quota: dynamic</text>

<!-- Arrows down to admission -->
<line x1="100" y1="112" x2="100" y2="140" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="240" y1="112" x2="240" y2="140" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="380" y1="112" x2="380" y2="140" stroke="rgb(194,192,182)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)" opacity="0.65"/>

<!-- ═══ ADMISSION CONTROL ═══ -->
<rect x="40" y="142" width="460" height="40" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.2)" stroke-width="0.5"/>
<text x="270" y="158" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(250,249,245)">Admission Control</text>
<text x="270" y="174" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">validate schema · assign priority · check per-MFE quota · attach AbortController</text>

<!-- Reject arrow (quota exceeded) -->
<line x1="500" y1="162" x2="560" y2="162" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<rect x="562" y="148" width="118" height="28" rx="4" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="621" y="166" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)">queued (wait turn)</text>

<!-- Arrow down to priority queue -->
<line x1="270" y1="182" x2="270" y2="206" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="284" y="198" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">enqueue</text>

<!-- ═══ 3-LEVEL PRIORITY QUEUE ═══ -->
<rect x="40" y="208" width="460" height="140" rx="8" fill="none" stroke="rgba(222,220,209,0.2)" stroke-width="0.5"/>
<text x="60" y="226" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">PRIORITY QUEUE (WFQ — Weighted Fair Queueing)</text>

<!-- P0: Critical -->
<rect x="56" y="238" width="428" height="28" rx="4" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="72" y="256" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(159,225,203)">P0  critical</text>
<rect x="186" y="242" width="20" height="20" rx="3" fill="rgb(93,202,165)" opacity="0.75"/>
<rect x="210" y="242" width="20" height="20" rx="3" fill="rgb(93,202,165)" opacity="0.65"/>
<rect x="234" y="242" width="20" height="20" rx="3" fill="rgb(93,202,165)" opacity="0.5"/>
<text x="386" y="256" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">user-triggered · real-time stream</text>

<!-- P1: Normal -->
<rect x="56" y="272" width="428" height="28" rx="4" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="72" y="290" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(206,203,246)">P1  normal</text>
<rect x="186" y="276" width="20" height="20" rx="3" fill="rgb(175,169,236)" opacity="0.75"/>
<rect x="210" y="276" width="20" height="20" rx="3" fill="rgb(175,169,236)" opacity="0.65"/>
<rect x="234" y="276" width="20" height="20" rx="3" fill="rgb(175,169,236)" opacity="0.5"/>
<rect x="258" y="276" width="20" height="20" rx="3" fill="rgb(175,169,236)" opacity="0.5"/>
<text x="386" y="290" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(175,169,236)" opacity="0.6">user-triggered · batch · default</text>

<!-- P2: Background -->
<rect x="56" y="306" width="428" height="28" rx="4" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.2)" stroke-width="0.5"/>
<text x="72" y="324" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(194,192,182)">P2  background</text>
<rect x="186" y="310" width="20" height="20" rx="3" fill="rgb(194,192,182)" opacity="0.65"/>
<rect x="210" y="310" width="20" height="20" rx="3" fill="rgb(194,192,182)" opacity="0.5"/>
<text x="386" y="324" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">prefetch · pre-warm · speculative</text>

<!-- Starvation guard label -->
<text x="270" y="345" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)" opacity="0.8">anti-starvation: after 8 P0/P1 dispatches → 1 guaranteed P2 dispatch</text>

<!-- Arrow down to concurrency limiter -->
<line x1="270" y1="348" x2="270" y2="374" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="284" y="366" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">dequeue</text>

<!-- ═══ CONCURRENCY LIMITER ═══ -->
<rect x="40" y="376" width="460" height="64" rx="8" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="60" y="394" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(240,153,123)" opacity="0.7" letter-spacing="0.06em">CONCURRENCY LIMITER</text>

<!-- 4 slots visual -->
<rect x="56" y="404" width="44" height="26" rx="4" fill="rgb(93,202,165)" opacity="0.65"/>
<text x="78" y="421" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)">slot 0</text>

<rect x="108" y="404" width="44" height="26" rx="4" fill="rgb(175,169,236)" opacity="0.65"/>
<text x="130" y="421" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)">slot 1</text>

<rect x="160" y="404" width="44" height="26" rx="4" fill="rgb(175,169,236)" opacity="0.65"/>
<text x="182" y="421" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)">slot 2</text>

<rect x="212" y="404" width="44" height="26" rx="4" fill="rgb(194,192,182)" opacity="0.5"/>
<text x="234" y="421" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">slot 3</text>

<text x="290" y="414" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(250,249,245)">max 4 concurrent</text>
<text x="290" y="430" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">per-MFE cap: floor(4 / active_mfe_count)</text>

<!-- Arrow down to Edge Agent -->
<line x1="270" y1="440" x2="270" y2="468" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="284" y="458" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">HTTP / WS</text>

<!-- ═══ EDGE AGENT ═══ -->
<rect x="140" y="470" width="260" height="36" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.2)" stroke-width="0.5"/>
<text x="270" y="492" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">Edge Agent · localhost:8741 · 64-slot internal queue</text>

<!-- ═══ BACKPRESSURE (right side) ═══ -->
<text x="534" y="226" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(200,80,70)" opacity="0.6" letter-spacing="0.06em">BACKPRESSURE</text>

<!-- 429 feedback -->
<path d="M400 490 L540 490 L540 260" fill="none" stroke="rgb(200,80,70)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text x="554" y="310" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)" opacity="0.8">429 received</text>

<rect x="520" y="248" width="160" height="64" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="600" y="268" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(200,80,70)" opacity="0.7">Backpressure handler</text>
<text x="600" y="284" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">pause dispatch loop</text>
<text x="600" y="298" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">reduce slots: 4 → 2</text>
<text x="600" y="312" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">honor Retry-After</text>

<!-- Restore arrow -->
<path d="M520 292 L508 380 L500 380" fill="none" stroke="rgb(93,202,165)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<text x="530" y="340" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">restore on</text>
<text x="530" y="352" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">200 OK</text>

<!-- ═══ CANCELLATION (right side) ═══ -->
<rect x="520" y="380" width="160" height="56" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.2)" stroke-width="0.5"/>
<text x="600" y="400" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.6">Cancellation</text>
<text x="600" y="416" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">MFE unmount → abort</text>
<text x="600" y="430" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">timeout → abort + free slot</text>

<!-- Footer -->
<text x="360" y="530" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">Client-side scheduler enforces fairness and priority before requests reach the agent.</text>
<text x="360" y="546" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">Agent's internal 64-slot queue sees at most 4 concurrent requests from this browser tab.</text>

<!-- ═══ SCHEDULING POLICY SUMMARY ═══ -->
<line x1="40" y1="560" x2="680" y2="560" stroke="rgba(222,220,209,0.12)" stroke-width="0.5"/>
<text x="90" y="580" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)" opacity="0.8">WFQ weights: P0 = 4 · P1 = 2 · P2 = 1</text>
<text x="360" y="580" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.8">anti-starvation: 8:1 ratio</text>
<text x="580" y="580" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)" opacity="0.8">timeout: 30s default</text>

<text x="90" y="598" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.75">per-MFE: floor(4/N) slots</text>
<text x="360" y="598" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.75">queue depth: 32 max</text>
<text x="580" y="598" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.75">backpressure: halve slots</text>
</svg>