<svg width="720" height="340" viewBox="0 0 720 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>NPU Health Probe — Exponential Backoff</title>
<desc>Shows how the device manager probes the quarantined NPU with exponential backoff (30s, 60s, 120s, 300s cap) and what constitutes a passing probe.</desc>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">NPU HEALTH PROBE STRATEGY</text>

<!-- Timeline axis -->
<line x1="80" y1="70" x2="660" y2="70" stroke="rgba(222,220,209,0.2)" stroke-width="0.5"/>
<text x="80" y="64" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.75">0s</text>
<text x="160" y="64" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.75">30s</text>
<text x="260" y="64" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.75">90s</text>
<text x="390" y="64" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.75">210s</text>
<text x="540" y="64" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.75">510s</text>
<text x="640" y="64" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.75">810s</text>

<!-- Crash marker -->
<circle cx="80" cy="70" r="5" fill="rgb(200,80,70)" opacity="0.8"/>
<text x="80" y="90" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(200,80,70)" opacity="0.7">fault</text>

<!-- Probe 1: 30s -->
<circle cx="160" cy="70" r="4" fill="rgb(200,80,70)" opacity="0.6"/>
<text x="160" y="90" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(200,80,70)" opacity="0.6">fail</text>
<text x="120" y="56" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">30s</text>

<!-- Probe 2: 90s -->
<circle cx="260" cy="70" r="4" fill="rgb(200,80,70)" opacity="0.6"/>
<text x="260" y="90" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(200,80,70)" opacity="0.6">fail</text>
<text x="210" y="56" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">60s</text>

<!-- Probe 3: 210s -->
<circle cx="390" cy="70" r="4" fill="rgb(200,80,70)" opacity="0.6"/>
<text x="390" y="90" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(200,80,70)" opacity="0.6">fail</text>
<text x="325" y="56" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">120s</text>

<!-- Probe 4: 510s -->
<circle cx="540" cy="70" r="5" fill="rgb(93,202,165)" opacity="0.8"/>
<text x="540" y="90" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)">pass</text>
<text x="465" y="56" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">300s (cap)</text>

<!-- Restored marker -->
<circle cx="560" cy="70" r="3" fill="rgb(93,202,165)"/>
<text x="600" y="74" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" font-weight="500" fill="rgb(159,225,203)">NPU restored</text>

<!-- Backoff formula -->
<line x1="40" y1="110" x2="680" y2="110" stroke="rgba(222,220,209,0.1)" stroke-width="0.5"/>
<text x="360" y="132" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">BACKOFF SCHEDULE</text>
<text x="360" y="152" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="rgb(206,203,246)">interval = min(30 × 2^n, 300) seconds</text>
<text x="360" y="168" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">30s → 60s → 120s → 300s → 300s → … (capped at 5 min)</text>

<!-- Probe definition -->
<line x1="40" y1="186" x2="680" y2="186" stroke="rgba(222,220,209,0.1)" stroke-width="0.5"/>
<text x="360" y="206" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">WHAT CONSTITUTES A PASSING PROBE</text>

<!-- Step 1 -->
<rect x="60" y="220" width="8" height="8" rx="4" fill="rgb(175,169,236)" opacity="0.8"/>
<text x="76" y="228" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(250,249,245)">1. Device enumeration</text>
<text x="76" y="244" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">Call D3D12CreateDevice with Qualcomm adapter. Must return S_OK, not DXGI_ERROR_*.</text>

<!-- Step 2 -->
<rect x="60" y="258" width="8" height="8" rx="4" fill="rgb(175,169,236)" opacity="0.8"/>
<text x="76" y="266" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(250,249,245)">2. Canary inference</text>
<text x="76" y="282" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">Run a tiny model (1-layer, ~1ms) on the NPU. Validates the full driver → hardware → result path.</text>

<!-- Step 3 -->
<rect x="60" y="296" width="8" height="8" rx="4" fill="rgb(175,169,236)" opacity="0.8"/>
<text x="76" y="304" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(250,249,245)">3. Result validation</text>
<text x="76" y="320" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">Canary output must match a known-good reference (±epsilon). Catches silent corruption.</text>
</svg>