<svg width="720" height="640" viewBox="0 0 720 640" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>Micro-Frontend Integration Architecture</title>
<desc>Shell-owned singleton service layer mediating between MFE feature modules and the localhost Edge Agent API. Shows shared connection pool, auth delegation, and event bus.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">MICRO-FRONTEND INTEGRATION ARCHITECTURE</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">shell-owned service layer · shared connection · event bus · auth delegation</text>

<!-- ═══ MFE MODULES (top) ═══ -->
<text x="52" y="62" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">FEATURE MODULES (runtime-loaded)</text>

<!-- Document Q&A MFE -->
<rect x="40" y="74" width="200" height="70" rx="8" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="140" y="96" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(206,203,246)">Document Q&amp;A</text>
<text x="140" y="114" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(175,169,236)" opacity="0.6">useEdgeAgent()</text>
<text x="140" y="130" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(175,169,236)" opacity="0.75">NMT · TTS · embedding</text>

<!-- Meeting Summariser MFE -->
<rect x="260" y="74" width="200" height="70" rx="8" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="360" y="96" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(206,203,246)">Meeting Summariser</text>
<text x="360" y="114" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(175,169,236)" opacity="0.6">useEdgeAgent()</text>
<text x="360" y="130" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(175,169,236)" opacity="0.75">ASR · NMT · summarise</text>

<!-- Future MFE (dashed) -->
<rect x="480" y="74" width="200" height="70" rx="8" fill="none" stroke="rgba(222,220,209,0.25)" stroke-width="0.5" stroke-dasharray="5 4"/>
<text x="580" y="96" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(194,192,182)" opacity="0.75">Future MFE</text>
<text x="580" y="114" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(194,192,182)" opacity="0.65">useEdgeAgent()</text>
<text x="580" y="130" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">same interface</text>

<!-- Arrows: MFEs → SDK -->
<line x1="140" y1="144" x2="140" y2="178" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="360" y1="144" x2="360" y2="178" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="580" y1="144" x2="580" y2="178" stroke="rgb(194,192,182)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)" opacity="0.65"/>

<text x="200" y="165" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(175,169,236)" opacity="0.8">React Context</text>
<text x="420" y="165" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(175,169,236)" opacity="0.8">React Context</text>

<!-- ═══ SHELL SERVICE LAYER ═══ -->
<rect x="40" y="180" width="640" height="136" rx="10" fill="none" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="60" y="198" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(93,202,165)" opacity="0.7" letter-spacing="0.06em">SHELL APPLICATION — EdgeAgentService (singleton)</text>

<!-- Sub-modules inside shell -->
<!-- Auth Manager -->
<rect x="56" y="210" width="130" height="46" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="121" y="228" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">Auth Manager</text>
<text x="121" y="244" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)" opacity="0.6">API key · CORS origin</text>

<!-- Connection Pool -->
<rect x="198" y="210" width="146" height="46" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="271" y="228" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">Connection Pool</text>
<text x="271" y="244" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)" opacity="0.6">HTTP + WS multiplexed</text>

<!-- Request Queue -->
<rect x="356" y="210" width="130" height="46" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="421" y="228" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">Request Queue</text>
<text x="421" y="244" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)" opacity="0.6">priority · dedup · cancel</text>

<!-- Health Monitor -->
<rect x="498" y="210" width="170" height="46" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="583" y="228" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">Health Monitor</text>
<text x="583" y="244" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)" opacity="0.6">device status · tier · events</text>

<!-- Event Bus -->
<rect x="56" y="268" width="612" height="36" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.2)" stroke-width="0.5"/>
<text x="362" y="290" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">Event Bus — device:status-changed · agent:connection-lost · agent:degraded · request:timeout</text>

<!-- Arrow: Shell → Edge Agent -->
<line x1="360" y1="316" x2="360" y2="360" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="376" y="342" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.8">single connection</text>

<!-- ═══ EDGE AGENT (bottom) ═══ -->
<rect x="140" y="362" width="440" height="70" rx="10" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.2)" stroke-width="0.5"/>
<text x="360" y="383" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">EDGE AGENT (localhost:8741)</text>

<!-- Sub-processes inside edge agent -->
<rect x="160" y="392" width="80" height="28" rx="4" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="200" y="410" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)">edge-api</text>

<rect x="260" y="392" width="100" height="28" rx="4" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="310" y="410" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)">edge-worker-0</text>

<rect x="380" y="392" width="100" height="28" rx="4" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="430" y="410" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)">edge-worker-1</text>

<rect x="500" y="392" width="60" height="28" rx="4" fill="none" stroke="rgba(222,220,209,0.25)" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="530" y="410" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.75">store</text>

<!-- ═══ COMPARISON: Direct vs Shell-Owned ═══ -->
<line x1="40" y1="452" x2="680" y2="452" stroke="rgba(222,220,209,0.12)" stroke-width="0.5"/>
<text x="360" y="474" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">ARCHITECTURE COMPARISON</text>

<!-- Option A: Direct (rejected) -->
<rect x="40" y="486" width="310" height="100" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5" opacity="0.6"/>
<text x="52" y="502" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(200,80,70)" opacity="0.7">OPTION A — Direct MFE → Agent (rejected)</text>
<text x="52" y="520" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">DocQA ──HTTP──→ localhost:8741</text>
<text x="52" y="534" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">MeetSum ──HTTP──→ localhost:8741</text>
<text x="52" y="552" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(200,80,70)" opacity="0.8">N connections · N API keys · no coordination</text>
<text x="52" y="568" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(200,80,70)" opacity="0.8">each MFE reinvents auth, error handling, health</text>

<!-- Option B: Shell-owned (chosen) -->
<rect x="370" y="486" width="310" height="100" rx="6" fill="rgb(38,38,36)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="382" y="502" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(93,202,165)" opacity="0.7">OPTION B — Shell-owned singleton (chosen)</text>
<text x="382" y="520" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.7">DocQA ──ctx──→ EdgeAgentService ─→ agent</text>
<text x="382" y="534" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.7">MeetSum ──ctx──→ EdgeAgentService ─→ agent</text>
<text x="382" y="552" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(93,202,165)" opacity="0.6">1 connection · 1 API key · centralized queue</text>
<text x="382" y="568" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(93,202,165)" opacity="0.6">shared health state · unified error handling</text>

<!-- Footer -->
<text x="360" y="612" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">MFEs consume EdgeAgentService via React Context. No direct localhost access. Shell owns the connection lifecycle.</text>
<text x="360" y="628" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">Single API key, single connection pool, single health monitor. MFEs are isolated from transport concerns.</text>
</svg>