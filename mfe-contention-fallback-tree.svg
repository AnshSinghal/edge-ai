<svg width="720" height="480" viewBox="0 0 720 480" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>Contention Fallback Decision Tree</title>
<desc>Decision tree specific to contention scenarios: how the scheduler decides what to do when a new request arrives while streams are occupying all slots.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">CONTENTION FALLBACK DECISION TREE</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">new request arrives while streams occupy all 4 slots — what happens next</text>

<!-- Root -->
<rect x="260" y="52" width="200" height="28" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.3)" stroke-width="0.5"/>
<text x="360" y="70" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(250,249,245)">New request during contention</text>

<line x1="360" y1="80" x2="360" y2="100" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- D1: What priority? -->
<rect x="270" y="102" width="180" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="360" y="120" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(175,169,236)">request priority?</text>

<!-- P0 critical branch -->
<line x1="270" y1="116" x2="100" y2="116" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="185" y="110" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.6">P0 critical</text>

<rect x="20" y="102" width="80" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="60" y="120" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)">any P2 slot?</text>

<!-- P0: yes preempt -->
<line x1="60" y1="130" x2="60" y2="155" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="70" y="148" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">yes</text>

<rect x="10" y="157" width="100" height="36" rx="4" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="60" y="172" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)">preempt P2</text>
<text x="60" y="186" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">dispatch P0 now</text>

<!-- P0: no preempt target → queue -->
<line x1="100" y1="116" x2="136" y2="116" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<path d="M136 116 L136 170 L116 170" fill="none" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="140" y="148" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.6">no</text>

<!-- P1 normal branch -->
<line x1="360" y1="130" x2="360" y2="160" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="370" y="148" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.6">P1 normal</text>

<!-- P1: queue depth check -->
<rect x="280" y="162" width="160" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="360" y="180" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(240,153,123)">queue &lt; 32?</text>

<!-- P1: yes queue -->
<line x1="360" y1="190" x2="360" y2="216" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="370" y="206" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">yes</text>

<rect x="270" y="218" width="180" height="56" rx="4" fill="rgb(38,38,36)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="360" y="236" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)">Enqueue in P1 lane</text>
<text x="360" y="252" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">emit: scheduler:queued { position }</text>
<text x="360" y="266" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">start 30s timeout timer</text>

<!-- P1: no → reject -->
<line x1="440" y1="176" x2="500" y2="176" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="470" y="170" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.6">no</text>

<rect x="502" y="162" width="140" height="36" rx="4" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="572" y="178" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)">reject: queue_full</text>
<text x="572" y="192" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">MFE shows "system busy"</text>

<!-- P2 background branch -->
<line x1="450" y1="116" x2="600" y2="116" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="525" y="110" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.6">P2 background</text>

<rect x="540" y="102" width="140" height="44" rx="4" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="610" y="120" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)">Enqueue in P2 lane</text>
<text x="610" y="136" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">start 60s timeout, may be</text>
<text x="610" y="148" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">preempted if P0 arrives</text>

<!-- ═══ WHAT TRIGGERS DISPATCH ═══ -->
<line x1="40" y1="296" x2="680" y2="296" stroke="rgba(222,220,209,0.12)" stroke-width="0.5"/>
<text x="360" y="318" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">WHAT UNBLOCKS THE QUEUED REQUEST?</text>

<!-- 4 trigger boxes -->
<rect x="40" y="332" width="150" height="56" rx="6" fill="rgb(38,38,36)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="60" y="350" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" font-weight="500" fill="rgb(159,225,203)">Stream completes</text>
<text x="60" y="364" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">SSE [DONE] → slot freed</text>
<text x="60" y="378" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">→ dequeue → dispatch</text>

<rect x="210" y="332" width="150" height="56" rx="6" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="230" y="350" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" font-weight="500" fill="rgb(245,196,179)">MFE unmounts</text>
<text x="230" y="364" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">cancelByCaller() →</text>
<text x="230" y="378" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">abort streams → dispatch</text>

<rect x="380" y="332" width="150" height="56" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="400" y="350" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" font-weight="500" fill="rgb(200,80,70)">Stream times out</text>
<text x="400" y="364" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">30s total timeout →</text>
<text x="400" y="378" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">abort + free → dispatch</text>

<rect x="550" y="332" width="130" height="56" rx="6" fill="rgb(38,38,36)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="570" y="350" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" font-weight="500" fill="rgb(206,203,246)">Batch completes</text>
<text x="570" y="364" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">non-streaming request</text>
<text x="570" y="378" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">finishes → dispatch</text>

<!-- Arrows to central dispatch -->
<line x1="115" y1="388" x2="115" y2="420" stroke="rgb(93,202,165)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<line x1="285" y1="388" x2="285" y2="420" stroke="rgb(240,153,123)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<line x1="455" y1="388" x2="455" y2="420" stroke="rgb(200,80,70)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<line x1="615" y1="388" x2="615" y2="420" stroke="rgb(175,169,236)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>

<!-- Central dispatch box -->
<rect x="200" y="422" width="320" height="28" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="360" y="440" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">dispatchLoop() → queued request dispatched</text>

<!-- Footer -->
<text x="360" y="470" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">The scheduler is event-driven: any slot release triggers the dequeue loop. No polling, no timers for queue processing.</text>
</svg>