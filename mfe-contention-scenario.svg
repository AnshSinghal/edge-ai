<svg width="720" height="520" viewBox="0 0 720 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>Streaming + Capacity Contention — System Architecture</title>
<desc>Two MFEs contending for 4 agent slots: Meeting Summariser holds 2 streaming slots, Document Q&amp;A submits a query when all 4 are occupied. Shows scheduler queueing, WFQ dispatch, and SSE token flow.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">STREAMING + CAPACITY CONTENTION — SYSTEM OVERVIEW</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">Meeting Summariser streaming (2 slots) · Doc Q&amp;A query arrives · scheduler queues + dispatches via WFQ</text>

<!-- ═══ MFE LAYER ═══ -->
<text x="40" y="62" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">MFE LAYER</text>

<!-- Meeting Summariser MFE -->
<rect x="40" y="72" width="200" height="90" rx="6" fill="rgb(38,38,36)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="60" y="92" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">Meeting Summariser</text>
<text x="60" y="108" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)" opacity="0.6">caller: 'meeting-sum'</text>
<text x="60" y="124" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">stream() — ASR (P0 critical)</text>
<text x="60" y="138" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">stream() — TTS (P0 critical)</text>
<text x="60" y="152" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)" opacity="0.75">2 slots occupied (streaming)</text>

<!-- Document Q&A MFE -->
<rect x="280" y="72" width="200" height="90" rx="6" fill="rgb(38,38,36)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="300" y="92" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(206,203,246)">Document Q&amp;A</text>
<text x="300" y="108" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.6">caller: 'doc-qa'</text>
<text x="300" y="124" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">inference() — NMT (P1 normal)</text>
<text x="300" y="138" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)" opacity="0.8">→ arrives when 4/4 slots full</text>
<text x="300" y="152" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.75">0 slots occupied (queued)</text>

<!-- Slot allocation indicator -->
<rect x="520" y="72" width="160" height="90" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.3)" stroke-width="0.5"/>
<text x="540" y="92" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(250,249,245)">Slot Allocation</text>
<text x="540" y="112" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)">■ slot 0: meeting-sum ASR</text>
<text x="540" y="126" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)">■ slot 1: meeting-sum TTS</text>
<text x="540" y="140" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)">■ slot 2: meeting-sum (bg)</text>
<text x="540" y="154" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)">■ slot 3: meeting-sum (bg)</text>

<!-- ═══ SCHEDULER LAYER ═══ -->
<text x="40" y="186" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">SCHEDULER (inside EdgeAgentService)</text>

<!-- Arrows from MFEs to scheduler -->
<line x1="140" y1="162" x2="140" y2="198" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="380" y1="162" x2="380" y2="198" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- Priority Queue -->
<rect x="40" y="200" width="300" height="100" rx="6" fill="rgb(38,38,36)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="60" y="220" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">WFQ Priority Queue</text>

<text x="60" y="242" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)">P0 [critical]  wt:4  □ □ □ □  (empty)</text>
<text x="60" y="258" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)">P1 [normal]    wt:2  ■ □ □ □  (doc-qa query)</text>
<text x="60" y="274" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)">P2 [background] wt:1  □ □ □ □  (empty)</text>
<text x="60" y="290" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">state: SATURATED (4/4 slots full, queue non-empty)</text>

<!-- Concurrency limiter -->
<rect x="370" y="200" width="310" height="100" rx="6" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="390" y="220" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(245,196,179)">Concurrency Limiter</text>

<text x="390" y="242" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">global max: 4  in-flight: 4  (FULL)</text>
<text x="390" y="258" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">per-MFE max: floor(4/2) = 2</text>
<text x="390" y="274" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)" opacity="0.6">meeting-sum: 2/2 (at quota)</text>
<text x="390" y="290" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.6">doc-qa:      0/2 (waiting)</text>

<!-- Arrow from queue to limiter -->
<line x1="340" y1="250" x2="364" y2="250" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="352" y="244" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">WFQ</text>

<!-- ═══ AGENT LAYER ═══ -->
<text x="40" y="326" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">EDGE AGENT (localhost:8741)</text>

<!-- Agent -->
<rect x="40" y="336" width="640" height="60" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.3)" stroke-width="0.5"/>

<rect x="60" y="348" width="130" height="36" rx="4" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="125" y="364" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)">slot 0: ASR stream</text>
<text x="125" y="376" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">SSE: tokens flowing</text>

<rect x="200" y="348" width="130" height="36" rx="4" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="265" y="364" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)">slot 1: TTS stream</text>
<text x="265" y="376" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">SSE: audio chunks</text>

<rect x="340" y="348" width="130" height="36" rx="4" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="405" y="364" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)">slot 2: batch NMT</text>
<text x="405" y="376" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.8">completing soon...</text>

<rect x="480" y="348" width="130" height="36" rx="4" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="545" y="364" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)">slot 3: batch NMT</text>
<text x="545" y="376" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.8">completing soon...</text>

<!-- Arrows from limiter to agent -->
<line x1="525" y1="300" x2="525" y2="330" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="537" y="318" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">HTTP / SSE</text>

<!-- ═══ TIMELINE ═══ -->
<line x1="40" y1="414" x2="680" y2="414" stroke="rgba(222,220,209,0.12)" stroke-width="0.5"/>
<text x="360" y="434" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">CONTENTION RESOLUTION TIMELINE</text>

<!-- Timeline bar -->
<line x1="60" y1="460" x2="660" y2="460" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>

<circle cx="80" cy="460" r="3" fill="rgb(175,169,236)"/>
<text x="80" y="454" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.6">t=0</text>
<text x="80" y="476" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.8">doc-qa query</text>
<text x="80" y="488" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.8">→ queued (P1)</text>

<circle cx="210" cy="460" r="3" fill="rgb(93,202,165)"/>
<text x="210" y="454" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">t=~200ms</text>
<text x="210" y="476" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">batch slot frees</text>
<text x="210" y="488" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">→ doc-qa dispatched</text>

<circle cx="400" cy="460" r="3" fill="rgb(93,202,165)"/>
<text x="400" y="454" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">t=~250ms</text>
<text x="400" y="476" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">doc-qa result</text>
<text x="400" y="488" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">{ status: 'ok' }</text>

<circle cx="600" cy="460" r="3" fill="rgb(93,202,165)"/>
<text x="600" y="454" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">t=continuous</text>
<text x="600" y="476" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">meeting-sum SSE</text>
<text x="600" y="488" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">never interrupted</text>

<!-- Arrows -->
<line x1="86" y1="460" x2="204" y2="460" stroke="rgb(240,153,123)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<line x1="216" y1="460" x2="394" y2="460" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="406" y1="460" x2="594" y2="460" stroke="rgb(93,202,165)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>

<!-- Footer -->
<text x="360" y="510" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">Meeting Summariser streams are never interrupted. Document Q&amp;A query waits briefly, then dispatches when a slot frees.</text>
</svg>