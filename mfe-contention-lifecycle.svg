<svg width="720" height="440" viewBox="0 0 720 440" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>Contention Lifecycle — Per-Request State Machine</title>
<desc>State machine for a single request during contention: PENDING → QUEUED → DISPATCHED → STREAMING/COMPLETE, with cancel and timeout edges.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">CONTENTION LIFECYCLE — PER-REQUEST STATE MACHINE</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">what the MFE observes for each individual request during contention</text>

<!-- ═══ STATES ═══ -->

<!-- SUBMITTED -->
<rect x="40" y="70" width="100" height="40" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.3)" stroke-width="0.5"/>
<text x="90" y="90" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(250,249,245)">SUBMITTED</text>
<text x="90" y="102" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">MFE calls inference()</text>

<!-- QUEUED -->
<rect x="200" y="70" width="100" height="40" rx="6" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="250" y="90" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(245,196,179)">QUEUED</text>
<text x="250" y="102" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.8">waiting for slot</text>

<!-- DISPATCHED -->
<rect x="360" y="70" width="110" height="40" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="415" y="90" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">DISPATCHED</text>
<text x="415" y="102" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">HTTP in-flight</text>

<!-- COMPLETE -->
<rect x="540" y="56" width="110" height="34" rx="6" fill="rgb(38,38,36)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="595" y="77" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">COMPLETE</text>

<!-- STREAMING -->
<rect x="540" y="96" width="110" height="34" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="595" y="117" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">STREAMING</text>

<!-- CANCELLED -->
<rect x="200" y="166" width="100" height="34" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="250" y="187" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(200,80,70)">CANCELLED</text>

<!-- TIMED_OUT -->
<rect x="360" y="166" width="110" height="34" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="415" y="187" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(200,80,70)">TIMED_OUT</text>

<!-- PREEMPTED -->
<rect x="540" y="166" width="110" height="34" rx="6" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="595" y="187" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(240,153,123)">PREEMPTED</text>

<!-- ═══ TRANSITIONS ═══ -->

<!-- SUBMITTED → QUEUED -->
<line x1="140" y1="90" x2="194" y2="90" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="167" y="84" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.6">slots full</text>

<!-- SUBMITTED → DISPATCHED (skip queue) -->
<path d="M140 80 L170 60 L354 60 L360 70" fill="none" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="250" y="55" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">slot available → instant dispatch</text>

<!-- QUEUED → DISPATCHED -->
<line x1="300" y1="90" x2="354" y2="90" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="327" y="84" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">slot freed</text>

<!-- DISPATCHED → COMPLETE -->
<line x1="470" y1="80" x2="534" y2="73" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="502" y="69" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">200 OK</text>

<!-- DISPATCHED → STREAMING -->
<line x1="470" y1="100" x2="534" y2="110" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="502" y="112" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">SSE opens</text>

<!-- STREAMING → COMPLETE -->
<line x1="650" y1="96" x2="650" y2="96" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<path d="M650 96 L670 96 L670 73 L656 73" fill="none" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="680" y="86" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">[DONE]</text>

<!-- QUEUED → CANCELLED -->
<line x1="250" y1="110" x2="250" y2="160" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="262" y="140" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.6">abort()</text>

<!-- DISPATCHED → TIMED_OUT -->
<line x1="415" y1="110" x2="415" y2="160" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="427" y="140" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.6">30s / 60s</text>

<!-- DISPATCHED → PREEMPTED (P2 only) -->
<line x1="470" y1="110" x2="540" y2="166" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="520" y="140" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.6">P0 arrives</text>

<!-- PREEMPTED → QUEUED (re-queue) -->
<path d="M540 183 L450 183 L320 140 L300 110" fill="none" stroke="rgb(240,153,123)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<text x="425" y="196" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.8">re-queued at head of P2 lane</text>

<!-- ═══ MFE OBSERVABLE EVENTS ═══ -->
<line x1="40" y1="222" x2="680" y2="222" stroke="rgba(222,220,209,0.12)" stroke-width="0.5"/>
<text x="360" y="244" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">MFE-OBSERVABLE EVENTS PER STATE</text>

<!-- Table -->
<rect x="40" y="256" width="120" height="20" rx="0" fill="rgb(38,38,36)"/>
<text x="100" y="270" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.6">State</text>
<rect x="160" y="256" width="250" height="20" rx="0" fill="rgb(38,38,36)"/>
<text x="285" y="270" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.6">MFE receives</text>
<rect x="410" y="256" width="260" height="20" rx="0" fill="rgb(38,38,36)"/>
<text x="540" y="270" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.6">Recommended UI</text>

<text x="100" y="292" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(250,249,245)">SUBMITTED</text>
<text x="285" y="292" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">Promise pending (no event yet)</text>
<text x="540" y="292" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">Spinner / loading skeleton</text>

<text x="100" y="312" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)">QUEUED</text>
<text x="285" y="312" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">scheduler:queued { position }</text>
<text x="540" y="312" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">"Queued — position 1 of 3"</text>

<text x="100" y="332" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)">DISPATCHED</text>
<text x="285" y="332" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">scheduler:dispatched { queued_ms }</text>
<text x="540" y="332" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">"Processing..." (spinner continues)</text>

<text x="100" y="352" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)">STREAMING</text>
<text x="285" y="352" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">yield* tokens via AsyncGenerator</text>
<text x="540" y="352" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">Render each token incrementally</text>

<text x="100" y="372" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)">COMPLETE</text>
<text x="285" y="372" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">{ status: 'ok', meta: { queued_ms } }</text>
<text x="540" y="372" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">Show final result</text>

<text x="100" y="392" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)">CANCELLED</text>
<text x="285" y="392" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">Promise never resolves (GC'd)</text>
<text x="540" y="392" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">MFE unmounted — no UI needed</text>

<text x="100" y="412" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)">TIMED_OUT</text>
<text x="285" y="412" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">{ status: 'error', code: 'timeout' }</text>
<text x="540" y="412" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">"Timed out. Retry?" button</text>

<!-- Footer -->
<text x="360" y="436" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">PREEMPTED is invisible to P2 callers — the request is silently re-queued and retried.</text>
</svg>