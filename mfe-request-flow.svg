<svg width="720" height="580" viewBox="0 0 720 580" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>MFE Request Flow — Shell-Owned Service Layer</title>
<desc>Sequence diagram showing how a Document Q&amp;A request flows through the shell's EdgeAgentService to the Edge Agent, with auth, queuing, health checks, and response routing.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">MFE REQUEST FLOW</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">useEdgeAgent() → EdgeAgentService → edge-api → edge-worker</text>

<!-- Swimlane headers -->
<rect x="40" y="50" width="100" height="30" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="90" y="69" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(206,203,246)">Doc Q&amp;A MFE</text>

<rect x="190" y="50" width="120" height="30" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="250" y="69" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">EdgeAgentSvc</text>

<rect x="370" y="50" width="100" height="30" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="420" y="69" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">edge-api</text>

<rect x="530" y="50" width="100" height="30" rx="6" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="580" y="69" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(245,196,179)">edge-worker</text>

<!-- Swimlane lines -->
<line x1="90" y1="80" x2="90" y2="540" stroke="rgb(175,169,236)" stroke-width="0.5" opacity="0.65"/>
<line x1="250" y1="80" x2="250" y2="540" stroke="rgb(93,202,165)" stroke-width="0.5" opacity="0.65"/>
<line x1="420" y1="80" x2="420" y2="540" stroke="rgb(93,202,165)" stroke-width="0.5" opacity="0.65"/>
<line x1="580" y1="80" x2="580" y2="540" stroke="rgb(240,153,123)" stroke-width="0.5" opacity="0.65"/>

<!-- Step 1: MFE calls hook -->
<line x1="90" y1="105" x2="244" y2="105" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="167" y="100" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.7">inference({ model, input })</text>

<!-- Step 2: Service validates + queues -->
<rect x="210" y="115" width="80" height="36" rx="4" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="250" y="130" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">validate</text>
<text x="250" y="142" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">enqueue</text>

<!-- Step 3: Service checks health -->
<rect x="210" y="160" width="80" height="24" rx="4" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="250" y="176" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">health check</text>

<!-- Step 4: Service → edge-api (HTTP) -->
<line x1="250" y1="194" x2="414" y2="194" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="332" y="189" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)" opacity="0.7">POST /v1/inference</text>
<text x="332" y="202" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">Authorization: Bearer ek_live_...</text>

<!-- Step 5: edge-api auth + dispatch -->
<rect x="380" y="212" width="80" height="36" rx="4" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="420" y="227" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">auth</text>
<text x="420" y="239" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">route (sticky)</text>

<!-- Step 6: edge-api → worker (IPC) -->
<line x1="420" y1="258" x2="574" y2="258" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="497" y="253" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)" opacity="0.7">IPC (msgpack)</text>

<!-- Step 7: worker runs inference -->
<rect x="540" y="270" width="80" height="36" rx="4" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="580" y="285" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(240,153,123)" opacity="0.6">model.Run()</text>
<text x="580" y="297" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(240,153,123)" opacity="0.6">ANE / GPU / CPU</text>

<!-- Step 8: worker → edge-api (result) -->
<line x1="574" y1="318" x2="426" y2="318" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="497" y="313" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)" opacity="0.7">result (msgpack)</text>

<!-- Step 9: edge-api → Service (HTTP response) -->
<line x1="414" y1="340" x2="256" y2="340" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="332" y="335" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)" opacity="0.7">200 OK + X-Edge-* headers</text>

<!-- Step 10: Service processes response -->
<rect x="210" y="352" width="80" height="36" rx="4" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="250" y="367" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">parse headers</text>
<text x="250" y="379" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">emit events</text>

<!-- Step 11: Service → MFE (result) -->
<line x1="244" y1="400" x2="96" y2="400" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="167" y="395" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.7">{ result, _meta }</text>

<!-- Step 12: Event bus notification -->
<line x1="250" y1="420" x2="250" y2="440" stroke="rgb(194,192,182)" stroke-width="0.5" stroke-dasharray="3 3"/>
<rect x="146" y="442" width="208" height="24" rx="4" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="250" y="458" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">emit('device:status-changed', { tier: 1 })</text>

<!-- Timing annotations -->
<text x="660" y="105" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">t = 0ms</text>
<text x="660" y="194" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">t = 1ms</text>
<text x="660" y="258" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">t = 2ms</text>
<text x="660" y="318" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">t = 50ms</text>
<text x="660" y="400" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">t = 52ms</text>

<!-- Footer -->
<text x="360" y="492" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">MFE never touches HTTP, auth, or connection management. EdgeAgentService handles all transport concerns.</text>
<text x="360" y="508" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">Health events are broadcast to all MFEs via the event bus — each can adapt its UI independently.</text>

<!-- ═══ CONCURRENT REQUEST HANDLING ═══ -->
<line x1="40" y1="524" x2="680" y2="524" stroke="rgba(222,220,209,0.12)" stroke-width="0.5"/>
<text x="360" y="544" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">Concurrent requests from multiple MFEs are multiplexed over the same connection. Request IDs track which MFE gets which response.</text>
<text x="360" y="560" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">If one MFE unmounts mid-request, the service cancels only its pending requests — other MFEs are unaffected.</text>
</svg>