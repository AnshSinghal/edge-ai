<svg width="720" height="440" viewBox="0 0 720 440" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>EdgeAgentService Lifecycle — State Machine</title>
<desc>State machine for the shell's EdgeAgentService: INIT → CONNECTING → CONNECTED → DEGRADED → DISCONNECTED → RECONNECTING, with transition triggers and per-state behavior.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">EDGEAGENTSERVICE LIFECYCLE</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">state machine · connection management · MFE visibility</text>

<!-- ═══ STATE NODES ═══ -->

<!-- INIT -->
<rect x="40" y="60" width="100" height="44" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.3)" stroke-width="0.5"/>
<text x="90" y="78" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(250,249,245)">INIT</text>
<text x="90" y="94" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">no connection</text>

<!-- CONNECTING -->
<rect x="200" y="60" width="120" height="44" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="260" y="78" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(206,203,246)">CONNECTING</text>
<text x="260" y="94" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.6">HTTP + WS setup</text>

<!-- CONNECTED -->
<rect x="390" y="60" width="120" height="44" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="450" y="78" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(159,225,203)">CONNECTED</text>
<text x="450" y="94" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)" opacity="0.6">all tiers available</text>

<!-- DEGRADED -->
<rect x="580" y="60" width="110" height="44" rx="6" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="635" y="78" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(245,196,179)">DEGRADED</text>
<text x="635" y="94" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)" opacity="0.6">tier &gt; 0</text>

<!-- DISCONNECTED -->
<rect x="200" y="170" width="120" height="44" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="260" y="188" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(200,80,70)">DISCONNECTED</text>
<text x="260" y="204" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)" opacity="0.6">agent unreachable</text>

<!-- RECONNECTING -->
<rect x="420" y="170" width="120" height="44" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="480" y="188" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(206,203,246)">RECONNECTING</text>
<text x="480" y="204" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.6">exp backoff</text>

<!-- ═══ TRANSITIONS ═══ -->

<!-- INIT → CONNECTING -->
<line x1="140" y1="82" x2="194" y2="82" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="167" y="76" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">mount()</text>

<!-- CONNECTING → CONNECTED -->
<line x1="320" y1="82" x2="384" y2="82" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="352" y="76" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">200 OK</text>

<!-- CONNECTED → DEGRADED -->
<line x1="510" y1="82" x2="574" y2="82" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="542" y="76" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.6">tier &gt; 0</text>

<!-- DEGRADED → CONNECTED -->
<path d="M580 96 L520 96 L520 96" fill="none" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)" stroke-dasharray="3 3"/>
<text x="547" y="110" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">tier == 0</text>

<!-- CONNECTED → DISCONNECTED -->
<path d="M420 104 L420 140 L320 140 L320 164" fill="none" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="370" y="136" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.6">ECONNREFUSED / EPIPE</text>

<!-- DEGRADED → DISCONNECTED -->
<path d="M635 104 L635 140 L360 140 L320 164" fill="none" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="530" y="150" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.8">connection lost</text>

<!-- DISCONNECTED → RECONNECTING -->
<line x1="320" y1="192" x2="414" y2="192" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="367" y="186" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.6">auto (1s delay)</text>

<!-- RECONNECTING → CONNECTED (success) -->
<path d="M480 170 L480 130 L450 104" fill="none" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="498" y="136" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">success</text>

<!-- RECONNECTING → DISCONNECTED (fail, loop) -->
<path d="M420 198 L380 198 L340 198 L320 198" fill="none" stroke="rgb(200,80,70)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<text x="370" y="210" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.8">fail (backoff)</text>

<!-- CONNECTING → DISCONNECTED (initial fail) -->
<path d="M260 104 L260 164" fill="none" stroke="rgb(200,80,70)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<text x="274" y="136" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.8">timeout</text>

<!-- ═══ MFE VISIBILITY TABLE ═══ -->
<line x1="40" y1="238" x2="680" y2="238" stroke="rgba(222,220,209,0.12)" stroke-width="0.5"/>
<text x="360" y="260" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">MFE VISIBILITY PER STATE</text>

<!-- Table header -->
<rect x="40" y="272" width="640" height="22" rx="0" fill="rgb(38,38,36)"/>
<text x="120" y="287" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.6">State</text>
<text x="270" y="287" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.6">useEdgeAgent() returns</text>
<text x="450" y="287" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.6">inference() behavior</text>
<text x="600" y="287" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.6">MFE should</text>

<!-- Row 1: INIT -->
<text x="120" y="310" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(250,249,245)">INIT</text>
<text x="270" y="310" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">connected: false</text>
<text x="450" y="310" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">queues, waits for connect</text>
<text x="600" y="310" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.8">show loading</text>

<!-- Row 2: CONNECTING -->
<text x="120" y="330" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)">CONNECTING</text>
<text x="270" y="330" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">connected: false</text>
<text x="450" y="330" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">queues, waits for connect</text>
<text x="600" y="330" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.8">show loading</text>

<!-- Row 3: CONNECTED -->
<text x="120" y="350" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)">CONNECTED</text>
<text x="270" y="350" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">connected: true, tier: 0</text>
<text x="450" y="350" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">dispatches immediately</text>
<text x="600" y="350" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.8">normal operation</text>

<!-- Row 4: DEGRADED -->
<text x="120" y="370" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)">DEGRADED</text>
<text x="270" y="370" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">connected: true, tier: N</text>
<text x="450" y="370" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">dispatches (slower result)</text>
<text x="600" y="370" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.8">show banner</text>

<!-- Row 5: DISCONNECTED -->
<text x="120" y="390" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)">DISCONNECTED</text>
<text x="270" y="390" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">connected: false</text>
<text x="450" y="390" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">returns error immediately</text>
<text x="600" y="390" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.8">show offline UI</text>

<!-- Row 6: RECONNECTING -->
<text x="120" y="410" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)">RECONNECTING</text>
<text x="270" y="410" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">connected: false, retrying</text>
<text x="450" y="410" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">queues, waits for reconnect</text>
<text x="600" y="410" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.8">show reconnecting</text>

<!-- Footer -->
<text x="360" y="436" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">MFEs never manage state transitions — they observe the current state via useEdgeAgent() and adapt their UI.</text>
</svg>