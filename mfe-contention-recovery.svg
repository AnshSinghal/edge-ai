<svg width="720" height="460" viewBox="0 0 720 460" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>Contention Recovery Sequences</title>
<desc>Recovery flows during streaming contention: stream interruption recovery, queue stall recovery, and stream-cancel-then-dispatch recovery.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">CONTENTION RECOVERY SEQUENCES</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">stream interruption · queue stall · stream-cancel-then-dispatch</text>

<!-- ═══ SCENARIO 1: STREAM INTERRUPTED ═══ -->
<rect x="40" y="50" width="640" height="120" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="60" y="68" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(200,80,70)">Scenario 1 — SSE Stream Interrupted Mid-Token</text>
<text x="60" y="82" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.75">Agent crashes while Meeting Summariser is streaming + Doc Q&amp;A is queued</text>

<!-- Timeline -->
<line x1="80" y1="108" x2="660" y2="108" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>

<circle cx="100" cy="108" r="3" fill="rgb(200,80,70)"/>
<text x="100" y="100" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.7">stream breaks</text>
<text x="100" y="124" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">SSE connection drops</text>

<circle cx="230" cy="108" r="3" fill="rgb(240,153,123)"/>
<text x="230" y="100" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.7">slots freed</text>
<text x="230" y="124" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">meeting-sum: error</text>
<text x="230" y="136" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">doc-qa: stays queued</text>

<circle cx="370" cy="108" r="3" fill="rgb(175,169,236)"/>
<text x="370" y="100" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.7">→ SUSPENDED</text>
<text x="370" y="124" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">scheduler pauses</text>
<text x="370" y="136" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">healthcheck polling</text>

<circle cx="510" cy="108" r="3" fill="rgb(93,202,165)"/>
<text x="510" y="100" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.7">agent restarts</text>
<text x="510" y="124" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">→ DRAINING</text>
<text x="510" y="136" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">doc-qa dispatched</text>

<circle cx="630" cy="108" r="3" fill="rgb(93,202,165)"/>
<text x="630" y="100" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.7">meeting-sum retries</text>
<text x="630" y="124" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">MFE re-submits stream</text>
<text x="630" y="136" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">new slot allocated</text>

<line x1="106" y1="108" x2="224" y2="108" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="236" y1="108" x2="364" y2="108" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="376" y1="108" x2="504" y2="108" stroke="rgb(175,169,236)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<line x1="516" y1="108" x2="624" y2="108" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- ═══ SCENARIO 2: QUEUE STALL ═══ -->
<rect x="40" y="180" width="640" height="120" rx="6" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="60" y="198" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(245,196,179)">Scenario 2 — Long-Running Streams Block Queue (Timeout Recovery)</text>
<text x="60" y="212" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.75">Meeting Summariser's 4 streams occupy all slots for &gt;30s. Doc Q&amp;A query times out.</text>

<line x1="80" y1="238" x2="660" y2="238" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>

<circle cx="100" cy="238" r="3" fill="rgb(175,169,236)"/>
<text x="100" y="230" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.7">t=0</text>
<text x="100" y="254" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.8">doc-qa queued (P1)</text>

<circle cx="250" cy="238" r="3" fill="rgb(240,153,123)"/>
<text x="250" y="230" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.7">t=10s</text>
<text x="250" y="254" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.8">per-MFE quota enforced</text>
<text x="250" y="266" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.8">meeting-sum: 2/2 max</text>

<circle cx="400" cy="238" r="3" fill="rgb(200,80,70)"/>
<text x="400" y="230" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.7">t=30s</text>
<text x="400" y="254" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.8">doc-qa: timeout</text>
<text x="400" y="266" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.8">"Request timed out"</text>

<circle cx="550" cy="238" r="3" fill="rgb(93,202,165)"/>
<text x="550" y="230" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.7">user retries</text>
<text x="550" y="254" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">stream may have freed</text>
<text x="550" y="266" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">slot by now → dispatch</text>

<line x1="106" y1="238" x2="244" y2="238" stroke="rgb(240,153,123)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<line x1="256" y1="238" x2="394" y2="238" stroke="rgb(200,80,70)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>
<line x1="406" y1="238" x2="544" y2="238" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>

<text x="360" y="290" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">Note: per-MFE quota (floor(4/2) = 2) ensures meeting-sum can't hold all 4 slots. But if N=1 MFE, it can hold 4.</text>

<!-- ═══ SCENARIO 3: STREAM CANCEL FREES SLOT ═══ -->
<rect x="40" y="310" width="640" height="120" rx="6" fill="rgb(38,38,36)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="60" y="328" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">Scenario 3 — User Cancels Stream → Queued Request Dispatches</text>
<text x="60" y="342" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.75">User stops meeting recording → streams abort → slot freed → doc-qa dispatched immediately</text>

<line x1="80" y1="368" x2="660" y2="368" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>

<circle cx="100" cy="368" r="3" fill="rgb(93,202,165)"/>
<text x="100" y="360" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.7">user clicks stop</text>
<text x="100" y="384" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">meeting-sum unmount</text>

<circle cx="230" cy="368" r="3" fill="rgb(240,153,123)"/>
<text x="230" y="360" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.7">cancelByCaller()</text>
<text x="230" y="384" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">abort 2 SSE streams</text>
<text x="230" y="396" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">TCP RST sent to agent</text>

<circle cx="370" cy="368" r="3" fill="rgb(93,202,165)"/>
<text x="370" y="360" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.7">2 slots freed</text>
<text x="370" y="384" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">dequeue loop fires</text>
<text x="370" y="396" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">per-MFE max: 4 (1 MFE)</text>

<circle cx="510" cy="368" r="3" fill="rgb(175,169,236)"/>
<text x="510" y="360" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.7">doc-qa dispatched</text>
<text x="510" y="384" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">slot acquired</text>
<text x="510" y="396" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">HTTP request sent</text>

<circle cx="630" cy="368" r="3" fill="rgb(93,202,165)"/>
<text x="630" y="360" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.7">result arrives</text>
<text x="630" y="384" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">{ status: 'ok' }</text>
<text x="630" y="396" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">queued_ms: 50</text>

<line x1="106" y1="368" x2="224" y2="368" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="236" y1="368" x2="364" y2="368" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="376" y1="368" x2="504" y2="368" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="516" y1="368" x2="624" y2="368" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- Footer -->
<text x="360" y="450" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">All three scenarios self-heal. The event-driven dequeue loop fires on every slot release, ensuring queued requests dispatch immediately.</text>
</svg>