<svg width="720" height="620" viewBox="0 0 720 620" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>API Contract Examples</title>
<desc>Request/response examples for inference, streaming, health, and error cases. Shows the contract is stable across all compute tiers.</desc>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">API CONTRACT EXAMPLES</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">stable contract · degradation via headers only · 127.0.0.1:8741</text>

<!-- ═══ INFERENCE REQUEST ═══ -->
<text x="52" y="62" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(93,202,165)" opacity="0.7" letter-spacing="0.06em">POST /v1/inference</text>

<!-- Request -->
<rect x="40" y="72" width="310" height="110" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="52" y="88" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.8">REQUEST</text>
<text x="52" y="106" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(175,169,236)">POST /v1/inference HTTP/1.1</text>
<text x="52" y="120" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(194,192,182)">Authorization: Bearer ek_live_...</text>
<text x="52" y="134" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(194,192,182)">Content-Type: application/json</text>
<text x="52" y="152" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)">{"model": "indic-tts-v3",</text>
<text x="52" y="166" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)"> "input": "नमस्ते",</text>
<text x="52" y="178" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)"> "params": {"temperature": 0.7}}</text>

<!-- Response -->
<rect x="370" y="72" width="310" height="110" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="382" y="88" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.8">RESPONSE (200 OK)</text>
<text x="382" y="106" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(93,202,165)">X-Edge-Compute: ane</text>
<text x="382" y="120" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(93,202,165)">X-Edge-Latency-Factor: 1.0</text>
<text x="382" y="134" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(93,202,165)">X-Edge-Device-Status: healthy</text>
<text x="382" y="152" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)">{"result": "...(audio b64)...",</text>
<text x="382" y="166" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)"> "model": "indic-tts-v3",</text>
<text x="382" y="178" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)"> "_meta": {"compute":"ane",</text>
<text x="382" y="178" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(194,192,182)" opacity="0.8">             "tier":0}}</text>

<!-- ═══ STREAMING (WebSocket) ═══ -->
<text x="52" y="208" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(175,169,236)" opacity="0.7" letter-spacing="0.06em">WS /v1/inference/stream</text>

<rect x="40" y="218" width="640" height="86" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="52" y="234" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.8">STREAM FRAMES (server → client)</text>
<text x="52" y="252" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(175,169,236)">{"type":"meta","compute":"cpu-fallback","tier":2,"latency_factor":4.0}</text>
<text x="52" y="268" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)">{"type":"token","text":"न"}</text>
<text x="52" y="282" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)">{"type":"token","text":"मस्ते"}</text>
<text x="52" y="296" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(93,202,165)">{"type":"done","total_ms":850}</text>

<!-- ═══ HEALTH ENDPOINT ═══ -->
<text x="52" y="328" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(240,153,123)" opacity="0.7" letter-spacing="0.06em">GET /v1/health/devices</text>

<rect x="40" y="338" width="640" height="100" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="52" y="354" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.8">RESPONSE (200 OK) — degraded state example</text>
<text x="52" y="372" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)">{"ane": {"state":"faulted","since":"2025-01-15T10:23:45Z","next_probe_s":28},</text>
<text x="52" y="386" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)"> "gpu": {"state":"ready"},</text>
<text x="52" y="400" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)"> "cpu": {"state":"ready","threads":8},</text>
<text x="52" y="414" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)"> "cloud":{"state":"ready","policy":"allowed"},</text>
<text x="52" y="428" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(93,202,165)"> "active_tier":1,"active_provider":"metal-gpu"}</text>

<!-- ═══ ERROR RESPONSES ═══ -->
<text x="52" y="462" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(200,80,70)" opacity="0.7" letter-spacing="0.06em">ERROR RESPONSES</text>

<rect x="40" y="472" width="310" height="60" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="52" y="488" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(200,80,70)" opacity="0.7">429 — queue full</text>
<text x="52" y="504" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)">Retry-After: 2</text>
<text x="52" y="518" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)">{"error":"queue_full","retry_after":2}</text>

<rect x="370" y="472" width="310" height="60" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="382" y="488" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(200,80,70)" opacity="0.7">503 — no workers available</text>
<text x="382" y="504" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)">Retry-After: 1</text>
<text x="382" y="518" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)">{"error":"no_workers","retry_after":1}</text>

<!-- Footer -->
<text x="360" y="556" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">API contract is identical across all compute tiers. Degradation is communicated via X-Edge-* headers + _meta field.</text>
<text x="360" y="572" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">Clients that ignore headers get correct results. Clients that read them can adapt UX.</text>
</svg>