<svg width="720" height="440" viewBox="0 0 720 440" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>Cancellation and Timeout Propagation</title>
<desc>How cancellation propagates from MFE unmount through the scheduler to the Edge Agent, freeing slots and aborting HTTP requests.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">CANCELLATION &amp; TIMEOUT PROPAGATION</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">AbortController chain · slot recovery · edge agent awareness</text>

<!-- ═══ SCENARIO 1: MFE Unmount ═══ -->
<text x="52" y="62" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(200,80,70)" opacity="0.7" letter-spacing="0.06em">SCENARIO 1 — MFE UNMOUNT (user navigates away)</text>

<!-- Chain: MFE → useEffect cleanup → scheduler → HTTP abort → slot freed -->
<rect x="40" y="76" width="100" height="36" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="90" y="90" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(206,203,246)">MFE unmount</text>
<text x="90" y="104" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.8">useEffect cleanup</text>

<line x1="140" y1="94" x2="168" y2="94" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>

<rect x="170" y="76" width="120" height="36" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="230" y="90" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)">cancel(caller)</text>
<text x="230" y="104" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">find all by caller_id</text>

<line x1="290" y1="94" x2="318" y2="94" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>

<rect x="320" y="76" width="120" height="36" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="380" y="90" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)">abort in-flight</text>
<text x="380" y="104" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">AbortController.abort()</text>

<line x1="440" y1="94" x2="468" y2="94" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>

<rect x="470" y="76" width="100" height="36" rx="6" fill="rgb(38,38,36)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="520" y="90" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)">free slots</text>
<text x="520" y="104" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">dequeue next</text>

<line x1="570" y1="94" x2="598" y2="94" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>

<rect x="600" y="76" width="80" height="36" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.2)" stroke-width="0.5"/>
<text x="640" y="90" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.8">drop queued</text>
<text x="640" y="104" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">same caller</text>

<!-- ═══ SCENARIO 2: Timeout ═══ -->
<text x="52" y="140" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(240,153,123)" opacity="0.7" letter-spacing="0.06em">SCENARIO 2 — REQUEST TIMEOUT (30s default)</text>

<rect x="40" y="154" width="110" height="36" rx="6" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="95" y="168" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)">setTimeout fires</text>
<text x="95" y="182" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">30s elapsed</text>

<line x1="150" y1="172" x2="178" y2="172" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>

<rect x="180" y="154" width="120" height="36" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="240" y="168" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)">abort request</text>
<text x="240" y="182" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">AbortController.abort()</text>

<line x1="300" y1="172" x2="328" y2="172" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>

<rect x="330" y="154" width="140" height="36" rx="6" fill="rgb(38,38,36)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="400" y="168" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)">resolve to MFE</text>
<text x="400" y="182" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">{ status:'error', code:'timeout' }</text>

<line x1="470" y1="172" x2="498" y2="172" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>

<rect x="500" y="154" width="100" height="36" rx="6" fill="rgb(38,38,36)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="550" y="168" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)">free slot</text>
<text x="550" y="182" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">dequeue next</text>

<!-- ═══ SCENARIO 3: Priority preemption ═══ -->
<text x="52" y="218" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(93,202,165)" opacity="0.7" letter-spacing="0.06em">SCENARIO 3 — PRIORITY PREEMPTION (P0 arrives, all slots used by P2)</text>

<rect x="40" y="232" width="120" height="36" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="100" y="246" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(159,225,203)">P0 arrives</text>
<text x="100" y="260" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">all 4 slots busy (P2)</text>

<line x1="160" y1="250" x2="188" y2="250" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>

<rect x="190" y="232" width="140" height="36" rx="6" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="260" y="246" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)">cancel youngest P2</text>
<text x="260" y="260" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">abort + requeue at P2 head</text>

<line x1="330" y1="250" x2="358" y2="250" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>

<rect x="360" y="232" width="100" height="36" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="410" y="246" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(159,225,203)">dispatch P0</text>
<text x="410" y="260" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">use freed slot</text>

<line x1="460" y1="250" x2="488" y2="250" stroke="rgb(194,192,182)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>

<rect x="490" y="232" width="120" height="36" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.2)" stroke-width="0.5"/>
<text x="550" y="246" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(194,192,182)" opacity="0.6">P2 retried later</text>
<text x="550" y="260" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">auto-retry transparent</text>

<!-- ═══ ABORT CHAIN DETAIL ═══ -->
<line x1="40" y1="290" x2="680" y2="290" stroke="rgba(222,220,209,0.12)" stroke-width="0.5"/>
<text x="360" y="312" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">ABORTCONTROLLER CHAIN</text>

<!-- Visual chain -->
<rect x="40" y="326" width="120" height="46" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="100" y="344" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" font-weight="500" fill="rgb(206,203,246)">MFE AbortSignal</text>
<text x="100" y="362" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.8">from useEdgeAgent()</text>

<line x1="160" y1="349" x2="188" y2="349" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="174" y="342" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.8">linked</text>

<rect x="190" y="326" width="140" height="46" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="260" y="344" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" font-weight="500" fill="rgb(200,80,70)">Scheduler Controller</text>
<text x="260" y="362" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">per-request, linked to MFE's</text>

<line x1="330" y1="349" x2="358" y2="349" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="344" y="342" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.8">linked</text>

<rect x="360" y="326" width="140" height="46" rx="6" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="430" y="344" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" font-weight="500" fill="rgb(200,80,70)">Fetch AbortController</text>
<text x="430" y="362" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">passed to fetch() / WS</text>

<line x1="500" y1="349" x2="528" y2="349" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>

<rect x="530" y="326" width="140" height="46" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.2)" stroke-width="0.5"/>
<text x="600" y="344" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" font-weight="500" fill="rgb(194,192,182)">TCP RST / WS close</text>
<text x="600" y="362" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.8">agent sees connection drop</text>

<!-- Explanation -->
<text x="360" y="396" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.75">MFE abort → scheduler abort → fetch abort → TCP close. Agent's gateway detects broken pipe and drops the request from its queue.</text>
<text x="360" y="412" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.75">Timeout controller is a parallel chain: setTimeout → abort (same propagation path). Whichever fires first wins.</text>

<!-- Footer -->
<text x="360" y="436" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">Every abort frees a concurrency slot, triggering the dequeue loop. No slots are wasted on abandoned requests.</text>
</svg>