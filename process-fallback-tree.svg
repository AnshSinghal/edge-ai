<svg width="720" height="460" viewBox="0 0 720 460" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>Process Crash Fallback Decision Tree</title>
<desc>Decision tree for supervisor crash handling: which process crashed, restart budget check, resource availability, and escalation to quarantine or health alert.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">PROCESS CRASH FALLBACK DECISION TREE</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">supervisor detects exit → classify → budget check → resource check → respawn or escalate</text>

<!-- Root: Process exited -->
<rect x="270" y="50" width="180" height="28" rx="6" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.3)" stroke-width="0.5"/>
<text x="360" y="68" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(250,249,245)">Child process exited</text>

<line x1="360" y1="78" x2="360" y2="100" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- D1: Which process? -->
<rect x="270" y="102" width="180" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="360" y="120" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(175,169,236)">which process?</text>

<!-- Gateway branch -->
<line x1="270" y1="116" x2="80" y2="116" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="175" y="110" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">edge-gateway</text>

<rect x="20" y="106" width="60" height="44" rx="4" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="50" y="122" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)">respawn</text>
<text x="50" y="136" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">always</text>
<text x="50" y="146" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">~200ms</text>

<!-- Model Manager branch -->
<line x1="270" y1="130" x2="140" y2="160" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="185" y="148" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">edge-model-mgr</text>

<rect x="82" y="150" width="60" height="44" rx="4" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="112" y="166" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)">respawn</text>
<text x="112" y="180" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">on next</text>
<text x="112" y="190" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">model op</text>

<!-- Worker branch (main tree) -->
<line x1="360" y1="130" x2="360" y2="160" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="374" y="148" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.6">edge-worker-N</text>

<!-- Supervisor branch -->
<line x1="450" y1="116" x2="600" y2="116" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="525" y="110" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.6">edge-supervisor</text>

<rect x="580" y="102" width="120" height="44" rx="4" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="640" y="118" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)">all children orphaned</text>
<text x="640" y="132" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">OS reaps processes</text>
<text x="640" y="142" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">tray relaunches ~3s</text>

<!-- D2: Restart budget exceeded? -->
<rect x="270" y="162" width="180" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="360" y="180" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(240,153,123)">budget exceeded? (&gt;5/60s)</text>

<!-- YES: quarantine -->
<line x1="450" y1="176" x2="560" y2="176" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="505" y="170" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.6">yes</text>

<rect x="562" y="162" width="120" height="44" rx="4" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="622" y="178" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)">QUARANTINE slot</text>
<text x="622" y="192" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">emit health alert</text>
<text x="622" y="202" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">503 for affinity reqs</text>

<!-- NO: check exit code -->
<line x1="360" y1="190" x2="360" y2="218" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="370" y="208" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">no</text>

<!-- D3: Known transient? -->
<rect x="270" y="220" width="180" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="360" y="238" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(175,169,236)">exit code known transient?</text>

<!-- YES: respawn normally -->
<line x1="360" y1="248" x2="360" y2="276" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="344" y="266" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">yes</text>

<!-- NO: respawn but suspicious -->
<line x1="450" y1="234" x2="560" y2="234" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="505" y="228" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.6">no (unknown)</text>

<rect x="562" y="220" width="120" height="36" rx="4" fill="rgb(38,38,36)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="622" y="236" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)">increment suspicious</text>
<text x="622" y="250" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">still respawn (below)</text>

<path d="M622 256 L622 286 L450 286" fill="none" stroke="rgb(240,153,123)" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arr)"/>

<!-- D4: Resources available? -->
<rect x="270" y="278" width="180" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="360" y="296" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(93,202,165)">memory available?</text>

<!-- YES: spawn -->
<line x1="360" y1="306" x2="360" y2="334" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="344" y="324" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">yes</text>

<!-- NO: defer -->
<line x1="270" y1="292" x2="130" y2="292" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="200" y="286" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.6">no</text>

<rect x="40" y="278" width="90" height="44" rx="4" fill="rgb(38,38,36)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="85" y="294" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)">defer restart</text>
<text x="85" y="308" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">notify gateway</text>
<text x="85" y="318" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(194,192,182)" opacity="0.75">reduce queue depth</text>

<!-- Spawn worker -->
<rect x="280" y="336" width="160" height="28" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="360" y="354" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">Respawn Worker</text>

<line x1="360" y1="364" x2="360" y2="386" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- D5: Warm restart possible? -->
<rect x="270" y="388" width="180" height="28" rx="14" fill="rgb(38,38,36)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="360" y="406" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(93,202,165)">page cache warm?</text>

<!-- YES: warm restart -->
<line x1="360" y1="416" x2="360" y2="436" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="344" y="430" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">yes</text>

<rect x="290" y="438" width="140" height="18" rx="3" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="360" y="451" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(93,202,165)">warm: ~200-500ms</text>

<!-- NO: cold start -->
<line x1="450" y1="402" x2="560" y2="402" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="505" y="396" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.6">no (evicted)</text>

<rect x="562" y="394" width="120" height="18" rx="3" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="622" y="407" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)">cold: ~2-5s</text>
</svg>