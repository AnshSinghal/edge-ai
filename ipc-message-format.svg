<svg width="720" height="340" viewBox="0 0 720 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>IPC Message Format</title>
<desc>Length-prefixed MessagePack wire format and platform-specific IPC mechanisms for Windows Named Pipes and macOS Unix Domain Sockets.</desc>

<!-- Title -->
<text x="360" y="22" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">IPC MESSAGE FORMAT</text>
<text x="360" y="38" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">length-prefixed MessagePack · 30-40% smaller than JSON</text>

<!-- Wire diagram -->
<!-- Header block -->
<rect x="100" y="60" width="140" height="60" rx="0" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="170" y="82" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(175,169,236)" opacity="0.7" letter-spacing="0.06em">HEADER</text>
<text x="170" y="102" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="rgb(206,203,246)">4 bytes</text>
<text x="170" y="114" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(175,169,236)" opacity="0.6">uint32 length (LE)</text>

<!-- Payload block -->
<rect x="240" y="60" width="380" height="60" rx="0" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="430" y="82" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(93,202,165)" opacity="0.7" letter-spacing="0.06em">PAYLOAD</text>
<text x="430" y="102" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="rgb(159,225,203)">N bytes</text>
<text x="430" y="114" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(93,202,165)" opacity="0.6">MessagePack-encoded body</text>

<!-- Bit markers -->
<text x="100" y="56" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(194,192,182)" opacity="0.75">0</text>
<text x="240" y="56" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(194,192,182)" opacity="0.75">32</text>
<text x="610" y="56" text-anchor="end" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(194,192,182)" opacity="0.75">32 + N×8</text>

<!-- Separator -->
<line x1="100" y1="148" x2="620" y2="148" stroke="rgba(222,220,209,0.1)" stroke-width="0.5"/>

<!-- Platform: Windows -->
<rect x="60" y="168" width="290" height="80" rx="8" fill="none" stroke="rgba(222,220,209,0.2)" stroke-width="0.5"/>
<rect x="60" y="168" width="8" height="80" rx="4 0 0 4" fill="rgb(175,169,236)" opacity="0.75"/>
<text x="84" y="192" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(250,249,245)">Windows 11</text>
<text x="84" y="212" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="rgb(175,169,236)">\\.\pipe\edge-{channel}</text>
<text x="84" y="230" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.6">Named Pipes · kernel-mediated · overlapped I/O</text>

<!-- Platform: macOS -->
<rect x="370" y="168" width="290" height="80" rx="8" fill="none" stroke="rgba(222,220,209,0.2)" stroke-width="0.5"/>
<rect x="370" y="168" width="8" height="80" rx="4 0 0 4" fill="rgb(93,202,165)" opacity="0.75"/>
<text x="394" y="192" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(250,249,245)">macOS 14+</text>
<text x="394" y="212" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="rgb(93,202,165)">/tmp/edge-{channel}.sock</text>
<text x="394" y="230" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.6">Unix Domain Sockets · zero-copy · SO_NOSIGPIPE</text>

<!-- Why not TCP? -->
<text x="360" y="280" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">WHY NOT TCP?</text>
<text x="360" y="300" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(194,192,182)" opacity="0.8">All communication is local. OS-native IPC avoids TCP handshake,</text>
<text x="360" y="316" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(194,192,182)" opacity="0.8">port allocation, and network stack traversal — lower latency per token.</text>
</svg>