<svg width="720" height="500" viewBox="0 0 720 500" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>Edge Agent Process Architecture</title>
<desc>Supervisor-tree process model: edge-supervisor spawns edge-api, edge-worker pool, and on-demand edge-store. Clients connect via HTTP loopback.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-both" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Section label -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">PROCESS ISOLATION BOUNDARY</text>

<!-- ── edge-supervisor ── -->
<rect x="260" y="38" width="200" height="58" rx="8" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="360" y="60" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(206,203,246)">edge-supervisor</text>
<text x="360" y="79" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" fill="rgb(175,169,236)">orchestrator · watchdog · health</text>
<text x="467" y="53" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.6">PERSISTENT</text>

<!-- Spawn: supervisor → API (left L-bend) -->
<path d="M310 96 L310 132 L180 132 L180 166" fill="none" stroke="rgb(194,192,182)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="245" y="127" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.55">spawn</text>

<!-- Spawn: supervisor → Workers (right) -->
<path d="M410 67 L580 67 L580 136" fill="none" stroke="rgb(194,192,182)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="510" y="60" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.55">spawn pool</text>

<!-- Spawn: supervisor → Store (on-demand, down-right) -->
<path d="M410 82 L440 82 L440 370 L432 370" fill="none" stroke="rgb(194,192,182)" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.6" marker-end="url(#arrow)"/>
<text x="456" y="230" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">on-demand</text>

<!-- ── edge-api ── -->
<rect x="60" y="166" width="240" height="62" rx="8" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="180" y="190" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(159,225,203)">edge-api</text>
<text x="180" y="210" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" fill="rgb(93,202,165)">HTTP + WS · auth · queue · CORS</text>
<text x="307" y="181" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.6">PERSISTENT</text>

<!-- ── Worker Pool boundary ── -->
<rect x="460" y="134" width="230" height="122" rx="10" fill="none" stroke="rgba(222,220,209,0.3)" stroke-width="0.5" stroke-dasharray="5 3" opacity="0.8"/>
<text x="575" y="149" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8" letter-spacing="0.06em">WORKER POOL  ×N</text>

<!-- Worker 0 -->
<rect x="474" y="160" width="96" height="44" rx="6" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="522" y="177" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(245,196,179)">worker-0</text>
<text x="522" y="193" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(240,153,123)">inference</text>

<!-- Worker 1 -->
<rect x="582" y="160" width="96" height="44" rx="6" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="630" y="177" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(245,196,179)">worker-1</text>
<text x="630" y="193" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(240,153,123)">inference</text>

<!-- Worker note -->
<text x="575" y="240" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">GPU: 2 default · CPU: 1 · max: floor(RAM ÷ model)</text>

<!-- IPC: API ↔ Workers -->
<line x1="300" y1="197" x2="460" y2="197" stroke="rgb(194,192,182)" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow-both)" fill="none"/>
<text x="380" y="191" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)">IPC</text>

<!-- Heartbeat: API → supervisor -->
<path d="M120 166 L120 120 L260 96" fill="none" stroke="rgb(156,154,146)" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.8"/>
<text x="160" y="134" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">heartbeat</text>

<!-- Heartbeat: workers → supervisor -->
<path d="M560 160 L560 120 L410 96" fill="none" stroke="rgb(156,154,146)" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.8"/>
<text x="510" y="114" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">heartbeat 5s</text>

<!-- ── Clients ── -->
<rect x="40" y="310" width="150" height="90" rx="8" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="115" y="332" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(250,249,245)">clients</text>
<text x="115" y="350" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" fill="rgb(194,192,182)">web app</text>
<text x="115" y="366" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" fill="rgb(194,192,182)">electron app</text>
<text x="115" y="382" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" fill="rgb(194,192,182)">browser ext.</text>

<!-- Client → API arrow -->
<path d="M115 310 L115 278 L170 278 L170 228" fill="none" stroke="rgb(194,192,182)" stroke-width="1" marker-end="url(#arrow)"/>
<text x="160" y="272" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)">HTTP 127.0.0.1</text>

<!-- ── edge-store (on-demand) ── -->
<rect x="230" y="354" width="200" height="58" rx="8" fill="none" stroke="rgba(222,220,209,0.3)" stroke-width="0.5" stroke-dasharray="5 4"/>
<text x="330" y="376" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgb(250,249,245)">edge-store</text>
<text x="330" y="396" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" fill="rgb(194,192,182)">model download · SHA-256 · LRU evict</text>
<text x="436" y="369" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.6">ON-DEMAND</text>

<!-- ── Legend ── -->
<rect x="40" y="438" width="640" height="48" rx="6" fill="none" stroke="rgba(222,220,209,0.3)" stroke-width="0.5" opacity="0.75"/>
<text x="56" y="458" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.7">Legend:</text>
<line x1="108" y1="454" x2="140" y2="454" stroke="rgb(194,192,182)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="146" y="458" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)">spawn / lifecycle</text>
<line x1="272" y1="454" x2="304" y2="454" stroke="rgb(194,192,182)" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow-both)"/>
<text x="310" y="458" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)">IPC (bi-dir)</text>
<line x1="400" y1="454" x2="432" y2="454" stroke="rgb(156,154,146)" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.7"/>
<text x="438" y="458" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)">heartbeat</text>
<rect x="528" y="449" width="10" height="10" rx="2" fill="none" stroke="rgba(222,220,209,0.3)" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="544" y="458" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)">on-demand boundary</text>
<line x1="108" y1="474" x2="140" y2="474" stroke="rgb(194,192,182)" stroke-width="1" marker-end="url(#arrow)"/>
<text x="146" y="478" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)">HTTP (loopback only)</text>
</svg>