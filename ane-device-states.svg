<svg width="720" height="400" viewBox="0 0 720 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>ANE + GPU + CPU Device State Machines</title>
<desc>Three parallel state machines for ANE, Metal GPU, and CPU. Shows how each device is independently quarantined and probed, and how the fallback selector walks down the tier list.</desc>
<defs>
  <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">PER-DEVICE STATE MACHINES</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">each device independently tracked · fallback selector walks the tier list</text>

<!-- ═══ ANE STATE MACHINE ═══ -->
<text x="124" y="66" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(93,202,165)" opacity="0.7" letter-spacing="0.06em">ANE (TIER 0)</text>

<!-- ANE: READY -->
<rect x="40" y="78" width="80" height="30" rx="15" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="80" y="97" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">READY</text>

<!-- ANE: READY → FAULTED -->
<line x1="120" y1="93" x2="148" y2="93" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr2)"/>

<!-- ANE: FAULTED -->
<rect x="150" y="78" width="80" height="30" rx="15" fill="rgb(113,43,19)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="190" y="97" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(240,120,110)">FAULTED</text>

<!-- ANE: FAULTED → PROBING -->
<path d="M190 108 L190 120 L80 120 L80 108" fill="none" stroke="rgb(175,169,236)" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="135" y="130" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(175,169,236)" opacity="0.8">probe 30s→300s</text>

<!-- ANE error label -->
<text x="168" y="74" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.8">kCMError</text>

<!-- ═══ GPU STATE MACHINE ═══ -->
<text x="370" y="66" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(175,169,236)" opacity="0.7" letter-spacing="0.06em">METAL GPU (TIER 1)</text>

<!-- GPU: READY -->
<rect x="286" y="78" width="80" height="30" rx="15" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="326" y="97" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(206,203,246)">READY</text>

<!-- GPU: READY → FAULTED -->
<line x1="366" y1="93" x2="394" y2="93" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr2)"/>

<!-- GPU: FAULTED -->
<rect x="396" y="78" width="80" height="30" rx="15" fill="rgb(113,43,19)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="436" y="97" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(240,120,110)">FAULTED</text>

<!-- GPU: recovery loop -->
<path d="M436 108 L436 120 L326 120 L326 108" fill="none" stroke="rgb(175,169,236)" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="381" y="130" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(175,169,236)" opacity="0.8">probe 30s→300s</text>

<!-- GPU error label -->
<text x="414" y="74" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.8">MTLError</text>

<!-- ═══ CPU STATE ═══ -->
<text x="610" y="66" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(240,153,123)" opacity="0.7" letter-spacing="0.06em">CPU (TIER 2)</text>

<!-- CPU: always READY -->
<rect x="556" y="78" width="110" height="30" rx="15" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="611" y="97" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(245,196,179)">ALWAYS READY</text>
<text x="611" y="120" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">cannot fault · last resort</text>

<!-- ═══ FALLBACK SELECTOR LOGIC ═══ -->
<line x1="40" y1="150" x2="680" y2="150" stroke="rgba(222,220,209,0.12)" stroke-width="0.5"/>
<text x="360" y="172" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">FALLBACK SELECTOR (runs on every request)</text>

<!-- Pseudocode -->
<rect x="100" y="184" width="520" height="132" rx="8" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="120" y="204" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(175,169,236)">fn select_provider(req):</text>
<text x="140" y="222" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(93,202,165)">if ane.state == READY:</text>
<text x="160" y="238" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(194,192,182)">return .all          </text>
<text x="310" y="238" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(194,192,182)" opacity="0.75">// ANE + GPU + CPU (Core ML picks best)</text>
<text x="140" y="256" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(206,203,246)">if gpu.state == READY:</text>
<text x="160" y="272" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(194,192,182)">return .cpuAndGPU    </text>
<text x="310" y="272" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(194,192,182)" opacity="0.75">// Metal GPU + CPU fallback</text>
<text x="140" y="290" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(245,196,179)">if req.latency_critical &amp;&amp; cloud.allowed:</text>
<text x="160" y="306" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(194,192,182)">return .cloud        </text>
<text x="310" y="306" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(194,192,182)" opacity="0.75">// remote inference, data leaves device</text>
<text x="140" y="306" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(240,153,123)">return .cpuOnly</text>

<!-- ═══ CLIENT HEADERS ═══ -->
<line x1="40" y1="330" x2="680" y2="330" stroke="rgba(222,220,209,0.12)" stroke-width="0.5"/>
<text x="360" y="352" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">RESPONSE HEADERS (SAME API CONTRACT)</text>

<text x="60" y="374" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(93,202,165)">X-Edge-Compute:</text>
<text x="220" y="374" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.6">ane | metal-gpu | cpu-fallback | cloud-fallback</text>

<text x="60" y="392" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(230,200,100)">X-Edge-Latency-Factor:</text>
<text x="260" y="392" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.6">1.0 | 1.8 | 4.0 | 1.2   (relative to ANE baseline)</text>
</svg>