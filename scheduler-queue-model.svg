<svg width="720" height="560" viewBox="0 0 720 560" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>Scheduler Architecture and Queueing Model</title>
<desc>Gateway request scheduler: bounded queue with backpressure, sticky routing by model ID, priority lanes, and worker dispatch strategy.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">SCHEDULER ARCHITECTURE &amp; QUEUEING MODEL</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">edge-api gateway · bounded queue · sticky routing · backpressure</text>

<!-- ═══ INCOMING REQUESTS ═══ -->
<rect x="40" y="56" width="120" height="70" rx="8" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="100" y="78" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(250,249,245)">clients</text>
<text x="100" y="96" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)">web · electron</text>
<text x="100" y="110" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)">browser ext</text>

<line x1="160" y1="91" x2="194" y2="91" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="177" y="85" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.8">HTTP</text>

<!-- ═══ AUTH + VALIDATE ═══ -->
<rect x="196" y="70" width="88" height="42" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="240" y="88" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">auth</text>
<text x="240" y="104" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">key + CORS + validate</text>

<line x1="284" y1="91" x2="318" y2="91" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- ═══ PRIORITY CLASSIFIER ═══ -->
<rect x="320" y="62" width="100" height="58" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="370" y="82" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(206,203,246)">classifier</text>
<text x="370" y="98" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(175,169,236)" opacity="0.6">stream → high pri</text>
<text x="370" y="112" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(175,169,236)" opacity="0.6">batch → normal pri</text>

<!-- ═══ BOUNDED QUEUE ═══ -->
<line x1="420" y1="80" x2="454" y2="80" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="437" y="74" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.8">high</text>

<line x1="420" y1="100" x2="454" y2="100" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="437" y="112" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.8">normal</text>

<!-- Queue box -->
<rect x="456" y="52" width="224" height="84" rx="8" fill="none" stroke="rgba(222,220,209,0.25)" stroke-width="0.5"/>
<text x="568" y="68" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">BOUNDED REQUEST QUEUE</text>

<!-- High priority lane -->
<rect x="466" y="76" width="24" height="16" rx="3" fill="rgb(93,202,165)" opacity="0.65"/>
<rect x="494" y="76" width="24" height="16" rx="3" fill="rgb(93,202,165)" opacity="0.65"/>
<rect x="522" y="76" width="24" height="16" rx="3" fill="rgb(93,202,165)" opacity="0.65"/>
<rect x="550" y="76" width="24" height="16" rx="3" fill="rgb(93,202,165)" opacity="0.5"/>
<text x="630" y="88" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">high (16 slots)</text>

<!-- Normal priority lane -->
<rect x="466" y="98" width="24" height="16" rx="3" fill="rgb(175,169,236)" opacity="0.65"/>
<rect x="494" y="98" width="24" height="16" rx="3" fill="rgb(175,169,236)" opacity="0.65"/>
<rect x="522" y="98" width="24" height="16" rx="3" fill="rgb(175,169,236)" opacity="0.65"/>
<rect x="550" y="98" width="24" height="16" rx="3" fill="rgb(175,169,236)" opacity="0.5"/>
<text x="630" y="110" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(175,169,236)" opacity="0.6">normal (48 slots)</text>

<!-- Backpressure -->
<text x="568" y="128" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(200,80,70)" opacity="0.6">full → 429 Too Many Requests</text>

<!-- ═══ STICKY ROUTER ═══ -->
<line x1="568" y1="136" x2="568" y2="168" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="582" y="155" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.8">dequeue</text>

<rect x="460" y="170" width="216" height="56" rx="8" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="568" y="190" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(206,203,246)">sticky router</text>
<text x="568" y="208" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(175,169,236)" opacity="0.6">route by model_id → worker affinity map</text>
<text x="568" y="220" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(175,169,236)" opacity="0.75">avoids 2-5s model swap penalty</text>

<!-- ═══ WORKERS ═══ -->
<line x1="510" y1="226" x2="510" y2="268" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="490" y="252" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.8">IPC</text>

<line x1="626" y1="226" x2="626" y2="268" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="640" y="252" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.8">IPC</text>

<!-- Worker 0 -->
<rect x="466" y="270" width="88" height="50" rx="6" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="510" y="290" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(245,196,179)">worker-0</text>
<text x="510" y="306" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)" opacity="0.6">indic-tts-v3</text>
<text x="510" y="314" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="7" fill="rgb(240,153,123)" opacity="0.75">state: busy</text>

<!-- Worker 1 -->
<rect x="582" y="270" width="88" height="50" rx="6" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="626" y="290" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(245,196,179)">worker-1</text>
<text x="626" y="306" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(240,153,123)" opacity="0.6">indic-nmt-v2</text>
<text x="626" y="314" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="7" fill="rgb(240,153,123)" opacity="0.75">state: idle</text>

<!-- ═══ ROUTING RULES ═══ -->
<line x1="40" y1="348" x2="680" y2="348" stroke="rgba(222,220,209,0.12)" stroke-width="0.5"/>
<text x="360" y="370" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">ROUTING RULES</text>

<!-- Rule 1 -->
<rect x="60" y="384" width="8" height="8" rx="4" fill="rgb(93,202,165)" opacity="0.8"/>
<text x="76" y="392" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(250,249,245)">Sticky affinity</text>
<text x="76" y="408" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">Same model_id → same worker. Avoids model swap (2-5s). Affinity map: model_id → worker_slot.</text>

<!-- Rule 2 -->
<rect x="60" y="420" width="8" height="8" rx="4" fill="rgb(175,169,236)" opacity="0.8"/>
<text x="76" y="428" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(250,249,245)">Least-loaded fallback</text>
<text x="76" y="444" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">If sticky worker is busy, route to least-loaded idle worker. Triggers model swap but avoids queueing.</text>

<!-- Rule 3 -->
<rect x="60" y="456" width="8" height="8" rx="4" fill="rgb(240,153,123)" opacity="0.8"/>
<text x="76" y="464" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(250,249,245)">Head-of-line priority</text>
<text x="76" y="480" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">High-priority (streaming) requests dequeue before normal (batch). Prevents batch starvation via 80/20 ratio.</text>

<!-- Rule 4 -->
<rect x="60" y="492" width="8" height="8" rx="4" fill="rgb(200,80,70)" opacity="0.8"/>
<text x="76" y="500" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="rgb(250,249,245)">Backpressure at 64</text>
<text x="76" y="516" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">Queue full (16 high + 48 normal = 64 total) → immediate 429. No unbounded growth. Client retry with Retry-After.</text>

<!-- Footer -->
<text x="360" y="548" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">Queue is in-memory only. Gateway crash → queue lost → clients retry. Stateless by design.</text>
</svg>