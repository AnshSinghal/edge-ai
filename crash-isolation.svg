<svg width="720" height="420" viewBox="0 0 720 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>Crash Isolation Matrix</title>
<desc>Shows impact and recovery for each process failure: supervisor (total, 3s), API (partial, 200ms), store (none, lazy), worker (partial, 500ms+2-5s model reload).</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="22" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">CRASH ISOLATION MATRIX</text>

<!-- Column headers -->
<text x="80" y="52" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.55" letter-spacing="0.06em">PROCESS</text>
<text x="260" y="52" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.55" letter-spacing="0.06em">API IMPACT</text>
<text x="440" y="52" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.55" letter-spacing="0.06em">INFERENCE IMPACT</text>
<text x="610" y="52" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.55" letter-spacing="0.06em">RECOVERY</text>
<line x1="40" y1="60" x2="680" y2="60" stroke="rgba(222,220,209,0.2)" stroke-width="0.5"/>

<!-- Row 1: Supervisor -->
<rect x="40" y="70" width="8" height="64" rx="4" fill="rgb(175,169,236)" opacity="0.6"/>
<text x="60" y="92" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="rgb(206,203,246)">edge-supervisor</text>
<text x="60" y="108" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">persistent · PID 1</text>
<text x="60" y="124" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(175,169,236)" opacity="0.7">SPOF (near-impossible)</text>

<circle cx="268" cy="90" r="4" fill="rgb(200,80,70)" opacity="0.8"/>
<text x="280" y="94" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(240,120,110)">total</text>
<text x="260" y="112" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(194,192,182)">children orphaned</text>

<circle cx="448" cy="90" r="4" fill="rgb(200,80,70)" opacity="0.8"/>
<text x="460" y="94" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(240,120,110)">total</text>
<text x="440" y="112" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(194,192,182)">all inference stops</text>

<text x="610" y="94" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(250,249,245)">~3 s</text>
<text x="610" y="112" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(194,192,182)">tray watchdog</text>
<text x="610" y="126" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(194,192,182)">relaunches agent</text>

<line x1="40" y1="142" x2="680" y2="142" stroke="rgba(222,220,209,0.1)" stroke-width="0.5"/>

<!-- Row 2: API Gateway -->
<rect x="40" y="152" width="8" height="64" rx="4" fill="rgb(93,202,165)" opacity="0.6"/>
<text x="60" y="174" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="rgb(159,225,203)">edge-api</text>
<text x="60" y="190" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">persistent · stateless</text>
<text x="60" y="206" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(93,202,165)" opacity="0.7">restart = reconnect</text>

<circle cx="268" cy="172" r="4" fill="rgb(200,170,50)" opacity="0.7"/>
<text x="280" y="176" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(230,200,100)">partial</text>
<text x="260" y="194" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(194,192,182)">clients get conn reset</text>

<circle cx="448" cy="172" r="4" fill="rgb(93,202,165)" opacity="0.7"/>
<text x="460" y="176" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(159,225,203)">none</text>
<text x="440" y="194" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(194,192,182)">in-flight completes</text>
<text x="440" y="208" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">(results undelivered)</text>

<text x="610" y="176" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(159,225,203)">~200 ms</text>
<text x="610" y="194" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(194,192,182)">supervisor restarts</text>

<line x1="40" y1="224" x2="680" y2="224" stroke="rgba(222,220,209,0.1)" stroke-width="0.5"/>

<!-- Row 3: Model Store -->
<rect x="40" y="234" width="8" height="64" rx="4" fill="rgb(194,192,182)" opacity="0.65"/>
<text x="60" y="256" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="rgb(250,249,245)">edge-store</text>
<text x="60" y="272" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">on-demand · sleeps when idle</text>

<circle cx="268" cy="254" r="4" fill="rgb(93,202,165)" opacity="0.7"/>
<text x="280" y="258" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(159,225,203)">none</text>
<text x="260" y="276" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(194,192,182)">API unaffected</text>

<circle cx="448" cy="254" r="4" fill="rgb(93,202,165)" opacity="0.7"/>
<text x="460" y="258" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(159,225,203)">none</text>
<text x="440" y="276" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(194,192,182)">loaded models persist</text>
<text x="440" y="290" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">in worker memory</text>

<text x="610" y="258" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(250,249,245)">lazy</text>
<text x="610" y="276" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(194,192,182)">next model op</text>

<line x1="40" y1="306" x2="680" y2="306" stroke="rgba(222,220,209,0.1)" stroke-width="0.5"/>

<!-- Row 4: Worker -->
<rect x="40" y="316" width="8" height="64" rx="4" fill="rgb(240,153,123)" opacity="0.6"/>
<text x="60" y="338" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="rgb(245,196,179)">edge-worker-{N}</text>
<text x="60" y="354" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">pooled · separate addr space</text>
<text x="60" y="370" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(240,153,123)" opacity="0.7">segfault-isolated</text>

<circle cx="268" cy="336" r="4" fill="rgb(200,170,50)" opacity="0.7"/>
<text x="280" y="340" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(230,200,100)">partial</text>
<text x="260" y="358" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(194,192,182)">503 for that worker</text>
<text x="260" y="372" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">gateway retries others</text>

<circle cx="448" cy="336" r="4" fill="rgb(200,170,50)" opacity="0.7"/>
<text x="460" y="340" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(230,200,100)">1 request lost</text>
<text x="440" y="358" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(194,192,182)">other workers OK</text>
<text x="440" y="372" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">requests rerouted</text>

<text x="610" y="340" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="rgb(245,196,179)">~500 ms</text>
<text x="610" y="358" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(194,192,182)">+ 2-5 s model reload</text>

<!-- Bottom note -->
<line x1="40" y1="394" x2="680" y2="394" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="360" y="412" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(194,192,182)" opacity="0.6">No single process crash brings down the entire agent. Supervisor SPOF mitigated by minimal code (~200 LOC, no biz logic).</text>
</svg>