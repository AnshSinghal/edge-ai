<svg width="720" height="520" viewBox="0 0 720 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>MFE Recovery Sequence — Agent Connection Loss</title>
<desc>Swimlane sequence showing recovery when the Edge Agent goes down mid-request: detection, MFE notification, reconnect loop, and transparent recovery.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">RECOVERY SEQUENCE — AGENT CONNECTION LOSS</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">detect · notify MFEs · reconnect · drain queued requests · restore</text>

<!-- Swimlane headers -->
<rect x="40" y="50" width="80" height="28" rx="5" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="80" y="68" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" font-weight="500" fill="rgb(206,203,246)">Doc Q&amp;A</text>

<rect x="160" y="50" width="80" height="28" rx="5" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="200" y="68" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" font-weight="500" fill="rgb(206,203,246)">Meeting Sum</text>

<rect x="290" y="50" width="100" height="28" rx="5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="340" y="68" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" font-weight="500" fill="rgb(159,225,203)">EdgeAgentSvc</text>

<rect x="440" y="50" width="80" height="28" rx="5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="480" y="68" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" font-weight="500" fill="rgb(159,225,203)">edge-api</text>

<rect x="570" y="50" width="100" height="28" rx="5" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="620" y="68" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" font-weight="500" fill="rgb(245,196,179)">edge-worker</text>

<!-- Swimlane lines -->
<line x1="80" y1="78" x2="80" y2="490" stroke="rgb(175,169,236)" stroke-width="0.5" opacity="0.5"/>
<line x1="200" y1="78" x2="200" y2="490" stroke="rgb(175,169,236)" stroke-width="0.5" opacity="0.5"/>
<line x1="340" y1="78" x2="340" y2="490" stroke="rgb(93,202,165)" stroke-width="0.5" opacity="0.5"/>
<line x1="480" y1="78" x2="480" y2="490" stroke="rgb(93,202,165)" stroke-width="0.5" opacity="0.5"/>
<line x1="620" y1="78" x2="620" y2="490" stroke="rgb(240,153,123)" stroke-width="0.5" opacity="0.5"/>

<!-- Phase 1: Normal operation -->
<text x="16" y="102" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">t=0</text>
<line x1="80" y1="100" x2="334" y2="100" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="207" y="96" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.6">inference({ model: 'nmt-v2' })</text>

<line x1="340" y1="110" x2="474" y2="110" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="407" y="106" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">POST /v1/inference</text>

<line x1="480" y1="120" x2="614" y2="120" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="547" y="116" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(240,153,123)" opacity="0.6">IPC dispatch</text>

<!-- Phase 2: CRASH -->
<text x="16" y="152" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(200,80,70)" opacity="0.6">CRASH</text>
<line x1="40" y1="156" x2="680" y2="156" stroke="rgb(200,80,70)" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.75"/>

<!-- Worker crash -->
<rect x="590" y="142" width="60" height="18" rx="3" fill="rgb(200,80,70)" opacity="0.5"/>
<text x="620" y="155" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)">0xC0000005</text>

<!-- edge-api detects broken pipe -->
<text x="16" y="176" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">t=2ms</text>
<rect x="450" y="166" width="60" height="18" rx="3" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="480" y="179" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.6">EPIPE</text>

<!-- edge-api returns 503 to service -->
<line x1="474" y1="192" x2="346" y2="192" stroke="rgb(200,80,70)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="407" y="188" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(200,80,70)" opacity="0.6">503 + Retry-After: 1</text>

<!-- Service handles 503 -->
<text x="16" y="214" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">t=3ms</text>
<rect x="304" y="204" width="72" height="30" rx="4" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="340" y="217" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">queue retry</text>
<text x="340" y="229" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">wait 1s</text>

<!-- Meanwhile, Meeting Sum tries to call -->
<text x="16" y="252" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">t=50ms</text>
<line x1="200" y1="250" x2="334" y2="250" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="267" y="246" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.6">stream({ model: 'asr' })</text>

<!-- Service queues it (knows agent is recovering) -->
<rect x="304" y="258" width="72" height="18" rx="4" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="340" y="271" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.6">queued locally</text>

<!-- Phase 3: Agent recovers -->
<text x="16" y="308" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(93,202,165)" opacity="0.6">RECOVER</text>
<line x1="40" y1="312" x2="680" y2="312" stroke="rgb(93,202,165)" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.65"/>

<!-- Worker restarted -->
<text x="16" y="330" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">t=500ms</text>
<rect x="590" y="322" width="60" height="18" rx="3" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="620" y="335" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)">idle</text>

<!-- Service retries DocQA request -->
<text x="16" y="362" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">t=1s</text>
<line x1="340" y1="360" x2="474" y2="360" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="407" y="356" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">retry POST (DocQA)</text>

<!-- edge-api → worker (IPC) -->
<line x1="480" y1="370" x2="614" y2="370" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>

<!-- Worker result back -->
<line x1="614" y1="385" x2="486" y2="385" stroke="rgb(240,153,123)" stroke-width="0.5" marker-end="url(#arr)"/>
<line x1="474" y1="395" x2="346" y2="395" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="407" y="391" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">200 OK</text>

<!-- Service → DocQA MFE (result) -->
<text x="16" y="416" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">t=1.05s</text>
<line x1="334" y1="414" x2="86" y2="414" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="207" y="410" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.6">{ status: 'ok', data: ... }</text>

<!-- Service drains MeetSum from queue -->
<text x="16" y="440" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="8" fill="rgb(194,192,182)" opacity="0.75">t=1.06s</text>
<line x1="340" y1="438" x2="474" y2="438" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="407" y="434" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.6">WS stream (MeetSum)</text>

<line x1="474" y1="450" x2="346" y2="450" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)" stroke-dasharray="3 3"/>
<text x="407" y="462" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(93,202,165)" opacity="0.8">stream tokens...</text>

<!-- Service → MeetSum (streaming) -->
<line x1="334" y1="470" x2="206" y2="470" stroke="rgb(175,169,236)" stroke-width="0.5" marker-end="url(#arr)" stroke-dasharray="3 3"/>
<text x="267" y="466" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="rgb(175,169,236)" opacity="0.6">yield tokens to MFE</text>

<!-- Footer -->
<text x="360" y="500" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">Total MFE-visible downtime: ~1s (Retry-After interval). MFEs see loading state, not error. No manual retry needed.</text>
<text x="360" y="516" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.65">Requests arriving during recovery are queued locally in the shell — not rejected. Drained automatically on restore.</text>
</svg>