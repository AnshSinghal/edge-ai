<svg width="720" height="680" viewBox="0 0 720 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect id="zds-svg-bg" x="0" y="0" width="100%" height="100%" fill="#0d1117"/>
<title>Worker Crash Recovery Sequence</title>
<desc>Exact recovery timeline when an inference worker crashes mid-request due to a Windows access violation. Shows supervisor detection, API response, worker restart, and warm restart optimization.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="360" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.08em">WORKER CRASH RECOVERY SEQUENCE</text>
<text x="360" y="36" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">access violation (0xC0000005) mid-inference → full recovery</text>

<!-- Swimlane headers -->
<text x="100" y="62" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(240,153,123)" opacity="0.7" letter-spacing="0.06em">WORKER-0</text>
<text x="270" y="62" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(175,169,236)" opacity="0.7" letter-spacing="0.06em">SUPERVISOR</text>
<text x="440" y="62" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(93,202,165)" opacity="0.7" letter-spacing="0.06em">API GATEWAY</text>
<text x="610" y="62" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8" letter-spacing="0.06em">CLIENT</text>

<!-- Swimlane lines -->
<line x1="100" y1="72" x2="100" y2="650" stroke="rgb(240,153,123)" stroke-width="0.5" opacity="0.5"/>
<line x1="270" y1="72" x2="270" y2="650" stroke="rgb(175,169,236)" stroke-width="0.5" opacity="0.5"/>
<line x1="440" y1="72" x2="440" y2="650" stroke="rgb(93,202,165)" stroke-width="0.5" opacity="0.5"/>
<line x1="610" y1="72" x2="610" y2="650" stroke="rgb(194,192,182)" stroke-width="0.5" opacity="0.5"/>

<!-- ═══ t=0ms: CRASH ═══ -->
<text x="24" y="98" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(200,80,70)">t = 0</text>
<line x1="60" y1="94" x2="680" y2="94" stroke="rgb(200,80,70)" stroke-width="0.5" opacity="0.65" stroke-dasharray="2 3"/>

<!-- Worker crash -->
<rect x="54" y="104" width="92" height="38" rx="6" fill="rgb(113,43,19)" stroke="rgb(200,80,70)" stroke-width="0.5"/>
<text x="100" y="120" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(240,120,110)">0xC0000005</text>
<text x="100" y="134" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(240,153,123)" opacity="0.7">process exits</text>

<!-- OS signal to supervisor -->
<line x1="146" y1="118" x2="218" y2="118" stroke="rgb(194,192,182)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text x="182" y="112" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(194,192,182)" opacity="0.8">SIGCHLD / wait</text>

<!-- IPC pipe breaks to gateway -->
<line x1="146" y1="130" x2="392" y2="130" stroke="rgb(200,80,70)" stroke-width="0.5" stroke-dasharray="2 4" marker-end="url(#arr)"/>
<text x="265" y="142" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(200,80,70)" opacity="0.6">pipe broken / EPIPE</text>

<!-- ═══ t=1-5ms: DETECTION ═══ -->
<text x="24" y="170" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(175,169,236)">1-5ms</text>
<line x1="60" y1="166" x2="680" y2="166" stroke="rgba(222,220,209,0.08)" stroke-width="0.5"/>

<!-- Supervisor detects -->
<rect x="210" y="174" width="120" height="48" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="270" y="192" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(206,203,246)">detect crash</text>
<text x="270" y="208" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(175,169,236)" opacity="0.7">read exit code</text>

<!-- Gateway detects -->
<rect x="386" y="174" width="108" height="48" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="440" y="192" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">detect EPIPE</text>
<text x="440" y="208" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(93,202,165)" opacity="0.7">mark worker dead</text>

<!-- ═══ t=5-15ms: LOG + DECIDE ═══ -->
<text x="24" y="244" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(175,169,236)">5-15</text>
<line x1="60" y1="240" x2="680" y2="240" stroke="rgba(222,220,209,0.08)" stroke-width="0.5"/>

<!-- Supervisor logs + checks budget -->
<rect x="198" y="248" width="144" height="56" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="270" y="264" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(206,203,246)">log crash event</text>
<text x="270" y="280" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(175,169,236)" opacity="0.7">check restart budget</text>
<text x="270" y="294" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="rgb(175,169,236)" opacity="0.8">crashes[w0] &lt; 5/60s?</text>

<!-- Gateway retries / responds -->
<rect x="382" y="248" width="116" height="56" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="440" y="264" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(159,225,203)">route decision</text>
<text x="440" y="280" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(93,202,165)" opacity="0.7">other worker free?</text>
<text x="440" y="294" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(93,202,165)" opacity="0.8">→ retry : → 503</text>

<!-- Gateway → Client -->
<line x1="498" y1="276" x2="570" y2="276" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arr)"/>
<rect x="562" y="262" width="96" height="30" rx="6" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="610" y="280" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="rgb(250,249,245)">503 + Retry</text>

<!-- ═══ t=15-50ms: RESPAWN ═══ -->
<text x="24" y="326" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(175,169,236)">15-50</text>
<line x1="60" y1="322" x2="680" y2="322" stroke="rgba(222,220,209,0.08)" stroke-width="0.5"/>

<!-- Supervisor spawns new worker -->
<rect x="198" y="330" width="144" height="48" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="270" y="348" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(206,203,246)">CreateProcess</text>
<text x="270" y="364" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(175,169,236)" opacity="0.7">new edge-worker-0</text>

<!-- Arrow: supervisor → new worker -->
<line x1="198" y1="354" x2="146" y2="354" stroke="rgb(194,192,182)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>

<!-- New worker starts -->
<rect x="58" y="340" width="84" height="34" rx="6" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="100" y="354" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(245,196,179)">init</text>
<text x="100" y="368" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(240,153,123)" opacity="0.7">connect IPC</text>

<!-- ═══ t=50-500ms: WARM RESTART ═══ -->
<text x="24" y="402" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="rgb(240,153,123)">50-500</text>
<line x1="60" y1="398" x2="680" y2="398" stroke="rgba(222,220,209,0.08)" stroke-width="0.5"/>

<!-- Worker loads from warm cache -->
<rect x="46" y="406" width="108" height="56" rx="6" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="100" y="424" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="rgb(245,196,179)">warm reload</text>
<text x="100" y="440" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(240,153,123)" opacity="0.7">mmap model file</text>
<text x="100" y="454" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(240,153,123)" opacity="0.8">OS page cache hit</text>

<!-- Notify supervisor: ready -->
<line x1="154" y1="434" x2="216" y2="434" stroke="rgb(93,202,165)" stroke-width="0.5" marker-end="url(#arr)"/>
<text x="185" y="428" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="9" fill="rgb(93,202,165)" opacity="0.6">idle</text>

<!-- Supervisor marks ready -->
<rect x="218" y="418" width="104" height="34" rx="6" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="270" y="438" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(206,203,246)">mark w0 ready</text>

<!-- Notify gateway -->
<line x1="322" y1="434" x2="392" y2="434" stroke="rgb(194,192,182)" stroke-width="0.5" marker-end="url(#arr)"/>
<rect x="392" y="418" width="96" height="34" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="440" y="438" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(159,225,203)">add to pool</text>

<!-- ═══ t=500ms: RECOVERED ═══ -->
<text x="24" y="486" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="600" fill="rgb(93,202,165)">500ms</text>
<line x1="60" y1="482" x2="680" y2="482" stroke="rgb(93,202,165)" stroke-width="0.5" opacity="0.65"/>

<rect x="300" y="490" width="120" height="26" rx="4" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="360" y="507" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="rgb(159,225,203)">RECOVERED</text>
<text x="360" y="532" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.8">full pool restored · accepting requests</text>

<!-- ═══ STATE PERSISTED TO DISK ═══ -->
<line x1="40" y1="554" x2="680" y2="554" stroke="rgba(222,220,209,0.15)" stroke-width="0.5"/>
<text x="360" y="574" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75" letter-spacing="0.06em">STATE PERSISTED TO DISK</text>

<text x="60" y="596" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(250,249,245)">crash_log.jsonl</text>
<text x="240" y="596" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.6">timestamp, exit code, worker id, model loaded, request id (no payload)</text>

<text x="60" y="616" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(250,249,245)">worker_state.json</text>
<text x="240" y="616" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.6">last model loaded per worker slot → enables warm restart hint</text>

<text x="60" y="636" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="11" fill="rgb(250,249,245)">restart_budget.json</text>
<text x="240" y="636" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.6">rolling crash count per child — survives supervisor restart</text>

<!-- Footer note -->
<text x="360" y="664" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif" font-size="10" fill="rgb(194,192,182)" opacity="0.75">No inference state is persisted — inference is stateless and idempotent. Client retries from scratch.</text>
</svg>